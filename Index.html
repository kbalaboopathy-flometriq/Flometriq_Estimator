/* ---- DATASHEET GENERATOR (popup, driven by DATASHEET_TEMPLATES) ---- */
function DatasheetModal({ openRef, openLines, model, modelItemMap, user, onClose }) {
  const itemName = (modelItemMap&&model&&modelItemMap.get(model)) || (openLines && openLines[0] && openLines[0].item) || "";
  const [template,setTemplate] = useState(undefined); // undefined=loading, null=none found
  const [values,setValues] = useState({});
  const [overrides,setOverrides] = useState({});
  const [loading,setLoading] = useState(true);
  const [saving,setSaving] = useState(false);
  const [saved,setSaved] = useState(false);
  const [fillOpen,setFillOpen] = useState(false);
  const [sectionIdx,setSectionIdx] = useState(0);

  const mocLines = useMemo(()=> (openLines||[]).filter(l=>l.show_in_moc===true), [openLines]);
  const bomMatches = useMemo(()=>{
    if(!template) return {};
    const used = new Set(); const out = {};
    template.sections.forEach(sec=>sec.fields.forEach(f=>{ if(f.type==="bom") out[f.key] = matchDatasheetBomLine(f, mocLines, used); }));
    return out;
  }, [template, mocLines]);
  // Material Data is always rebuilt straight from the ticked ("Show in MOC") lines —
  // whatever field list the uploaded Excel defined for this section is ignored.
  // Sub-assembly is the label, Grade is the value.
  const materialDataRows = useMemo(()=> (mocLines||[]).map(l=>({
    key: "moc-"+(l.reference_number||"")+"-"+l.sl_no,
    label: l.sub_assembly || l.component || "(unnamed)",
    value: l.grade || "—"
  })), [mocLines]);
  // Per-section "add line" draft inputs, keyed by section number: {label, value}
  const [addDraft,setAddDraft] = useState({});

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      setLoading(true);
      const t = await loadDatasheetMaster(itemName);
      if(cancelled) return;
      setTemplate(t);
      if(t){
        const { data } = await sb.from("datasheets").select("*").eq("reference_number",openRef.reference_number).eq("item_sl_no",openRef.item_sl_no).eq("template_key",normalizeItemName(itemName)).maybeSingle();
        if(!cancelled){
          setValues((data&&data.field_values)||{});
          setOverrides((data&&data.overrides)||{});
        }
      }
      if(!cancelled) setLoading(false);
    })();
    return ()=>{ cancelled=true; };
  },[itemName, openRef.reference_number, openRef.item_sl_no]);

  if(loading){
    return h("div",{style:{position:"fixed",inset:0,background:"rgba(20,20,20,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:80}},
      h("div",{style:{background:"#fff",borderRadius:8,padding:24,fontSize:13,color:colors.mutedLight}},"Loading…")
    );
  }

  if(!template){
    return h("div",{style:{position:"fixed",inset:0,background:"rgba(20,20,20,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:80}},
      h("div",{style:{background:"#fff",borderRadius:8,padding:24,maxWidth:420}},
        h("div",{style:{fontWeight:700,marginBottom:8}},"No datasheet template for this item"),
        h("div",{style:{fontSize:13,color:colors.muted,marginBottom:16}},"This estimate's item ("+(itemName||"—")+") doesn't have a datasheet master set up yet. Go to Datasheet Master (admin) to add one — either drag in an Excel file or add fields by hand."),
        h("button",{onClick:onClose,style:btnPrimary},"Close")
      )
    );
  }

  const editableSections = template.sections.filter(s=>!s.bomSection);
  const setField = (k,v)=>setValues(vv=>({...vv,[k]:v}));

  const getDisplayValue = (field)=>{
    if(field.type==="auto_model") return model||(openLines&&openLines[0]&&openLines[0].model)||"";
    if(field.type==="bom"){
      if(overrides[field.key]!==undefined) return overrides[field.key];
      return bomFieldDisplay(bomMatches[field.key]);
    }
    if(values[field.key]!==undefined) return values[field.key];
    return field.default||"";
  };

  // Every section — including Material Data — can have lines added or deleted
  // for this specific datasheet. Deletions/additions are stored per-section
  // inside the datasheet's own field_values (keys __deletedKeys / __extraRows),
  // so the master template (and other datasheets built from it) are untouched.
  const getDeletedKeys = (sectionNo)=> (values.__deletedKeys && values.__deletedKeys[sectionNo]) || [];
  const getExtraRows = (sectionNo)=> (values.__extraRows && values.__extraRows[sectionNo]) || [];
  const getSectionRows = (section)=>{
    const deleted = new Set(getDeletedKeys(section.no));
    let base;
    if(section.bomSection){
      base = materialDataRows.map(r=>({ key:r.key, label:r.label, value:r.value }));
    } else {
      base = section.fields.map(f=>({ key:f.key, label:f.label, value:getDisplayValue(f), field:f }));
    }
    base = base.filter(r=>!deleted.has(r.key));
    const extra = getExtraRows(section.no).map(r=>({ key:r.id, label:r.label, value:r.value, isExtra:true }));
    return [...base, ...extra];
  };
  const deleteRow = (sectionNo, row)=>{
    if(row.isExtra){
      setValues(vv=>{
        const cur = vv.__extraRows||{};
        const list = (cur[sectionNo]||[]).filter(r=>r.id!==row.key);
        return {...vv, __extraRows:{...cur,[sectionNo]:list}};
      });
    } else {
      setValues(vv=>{
        const cur = vv.__deletedKeys||{};
        const list = cur[sectionNo]||[];
        if(list.includes(row.key)) return vv;
        return {...vv, __deletedKeys:{...cur,[sectionNo]:[...list,row.key]}};
      });
    }
  };
  const restoreDeleted = (sectionNo)=>{
    setValues(vv=>{
      const cur = vv.__deletedKeys||{};
      if(!cur[sectionNo] || cur[sectionNo].length===0) return vv;
      return {...vv, __deletedKeys:{...cur,[sectionNo]:[]}};
    });
  };
  const addLine = (sectionNo)=>{
    const draft = addDraft[sectionNo]||{};
    if(!draft.label || !draft.label.trim()) return;
    setValues(vv=>{
      const cur = vv.__extraRows||{};
      const list = cur[sectionNo]||[];
      const newRow = { id:"extra-"+Date.now()+"-"+Math.random().toString(36).slice(2,6), label:draft.label.trim(), value:(draft.value||"").trim() };
      return {...vv, __extraRows:{...cur,[sectionNo]:[...list,newRow]}};
    });
    setAddDraft(d=>({...d,[sectionNo]:{label:"",value:""}}));
  };

  const saveAll = async()=>{
    setSaving(true);
    try {
      const payload = { reference_number: openRef.reference_number, item_sl_no: openRef.item_sl_no, template_key: normalizeItemName(itemName), field_values: values, overrides, updated_by: user.username, updated_at: new Date().toISOString() };
      await sb.from("datasheets").upsert(payload, { onConflict: "reference_number,item_sl_no,template_key" });
      await logAudit("SAVE","datasheets",openRef.reference_number+"-"+openRef.item_sl_no,"Datasheet ("+itemName+") for "+openRef.reference_number+" Sl No "+openRef.item_sl_no,user.username,null,payload);
      setSaved(true); setTimeout(()=>setSaved(false),2000);
    } catch(e){ console.error("Datasheet save failed",e); }
    finally{ setSaving(false); }
  };

  const exportExcel = ()=>{
    const rows = [];
    rows.push(["", template.docTitle, "", ""]);
    rows.push([]);
    rows.push(["Client", openRef.description||"", "Our Ref Num", openRef.reference_number]);
    rows.push(["Ref Number", openRef.reference_number, "Date", new Date().toLocaleDateString("en-GB")]);
    rows.push([]);
    template.sections.forEach(section=>{
      rows.push([section.bomSection?"Material Data":section.title, section.no, "", ""]);
      getSectionRows(section).forEach(row=>rows.push([row.label, row.value, "", ""]));
      rows.push([]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{wch:28},{wch:40},{wch:14},{wch:16}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Datasheet");
    XLSX.writeFile(wb, openRef.reference_number+"_sl"+openRef.item_sl_no+"_"+itemName.replace(/\s+/g,"_")+"_Datasheet.xlsx");
  };

  const exportPDF = ()=>{
    const today = new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W = doc.internal.pageSize.getWidth();
    const dark = [28,31,26];
    const neutral = [244,242,234];
    const drawLetterhead = ()=>{
      try { doc.addImage(COMPANY_LOGO,"PNG",10,4,36,18); } catch(e){}
      doc.setFontSize(11); doc.setTextColor(...dark); doc.setFont(undefined,"bold");
      doc.text(COMPANY_NAME,W-14,8,{align:"right"});
      doc.setFontSize(7); doc.setFont(undefined,"normal"); doc.setTextColor(100,100,100);
      doc.text(COMPANY_ADDRESS,W-14,13,{align:"right"});
      doc.text(COMPANY_WEBSITE+"   |   "+COMPANY_EMAIL,W-14,17.5,{align:"right"});
      doc.setFontSize(8.5); doc.setTextColor(...dark); doc.setFont(undefined,"bold");
      doc.text("TECHNICAL DATA SHEET",W-14,23,{align:"right"});
      doc.setDrawColor(200,197,185); doc.setLineWidth(0.4);
      doc.line(10,27,W-10,27);
    };
    drawLetterhead();
    doc.setTextColor(...dark); doc.setFontSize(9); let y=34;
    const lbl=(l,v)=>{ doc.setFont(undefined,"bold"); doc.text(l+":",12,y); doc.setFont(undefined,"normal"); doc.text(String(v||""),42,y); y+=6; };
    lbl("Item",itemName); lbl("Quote#",openRef.reference_number+" — Sl No "+openRef.item_sl_no);
    if(openRef.description) lbl("Description",openRef.description);
    lbl("Date",today);
    y += 2;
    template.sections.forEach(section=>{
      const head = [[{content:(section.bomSection?"Material Data":section.title),colSpan:2,styles:{fillColor:neutral,textColor:dark,fontStyle:"bold",fontSize:9}}]];
      // Blank values are skipped entirely — e.g. if Operating Pressure was left blank, that line does not appear.
      const filledRows = getSectionRows(section).filter(row=>row.value!==undefined && row.value!==null && String(row.value).trim()!=="" && row.value!=="—");
      const body = filledRows.length ? filledRows.map(row=>[row.label,row.value]) : [["","No data entered for this section."]];
      doc.autoTable({
        startY:y, head, body, theme:"grid",
        bodyStyles:{fontSize:8.5,textColor:dark},
        headStyles:{fillColor:neutral,textColor:dark,fontStyle:"bold",fontSize:9,lineColor:[216,212,197],lineWidth:0.2},
        columnStyles:{0:{cellWidth:65,fontStyle:"bold",textColor:[100,100,100]},1:{cellWidth:"auto"}},
        margin:{top:32,left:12,right:12,bottom:18},
        didDrawPage:drawLetterhead,
      });
      y = doc.lastAutoTable.finalY + 6;
      if(y > doc.internal.pageSize.getHeight()-30){ doc.addPage(); drawLetterhead(); y = 34; }
    });
    const pageCount = doc.internal.getNumberOfPages();
    for(let i=1;i<=pageCount;i++){
      doc.setPage(i); doc.setFontSize(7); doc.setTextColor(150);
      doc.text("Page "+i+" of "+pageCount,W-12,doc.internal.pageSize.getHeight()-5,{align:"right"});
      doc.setTextColor(...dark);
      doc.text(COMPANY_NAME+" | Datasheet | "+today,12,doc.internal.pageSize.getHeight()-5);
    }
    doc.save(openRef.reference_number+"_sl"+openRef.item_sl_no+"_"+itemName.replace(/\s+/g,"_")+"_Datasheet.pdf");
  };

  const filledCount = editableSections.reduce((sum,s)=>sum+s.fields.filter(f=>(values[f.key]!==undefined&&values[f.key]!=="")||f.default).length,0);
  const totalCount = editableSections.reduce((sum,s)=>sum+s.fields.length,0);

  return h("div",{style:{position:"fixed",inset:0,background:"rgba(20,20,20,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:80,padding:16}},
    h("div",{style:{background:"#fff",borderRadius:8,width:900,maxWidth:"96vw",maxHeight:"92vh",display:"flex",flexDirection:"column"}},
      h("div",{style:{background:colors.dark,color:"#fff",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",borderRadius:"8px 8px 0 0"}},
        h("div",null,
          h("div",{style:{fontWeight:700,fontSize:14}},"Datasheet — "+openRef.reference_number+" · Sl No "+openRef.item_sl_no),
          h("div",{style:{fontSize:11,opacity:0.75}},template.docTitle)
        ),
        h("button",{onClick:onClose,style:{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:16}},"✕")
      ),
      loading ? h("div",{style:{padding:24,fontSize:13,color:colors.mutedLight}},"Loading…") :
      h("div",{style:{overflowY:"auto",flex:1,padding:"16px 20px"}},
        h("div",{style:{display:"flex",gap:10,alignItems:"center",marginBottom:14,flexWrap:"wrap"}},
          h("button",{onClick:()=>{setSectionIdx(0);setFillOpen(true);},style:btnPrimary},"Fill remaining details ("+filledCount+"/"+totalCount+")"),
          h("button",{onClick:saveAll,style:{...btnSecondary,color:saved?"#1c8c56":colors.text}}, saving?"Saving…":(saved?"Saved ✓":"Save")),
          h("button",{onClick:exportExcel,style:btnSecondary},"Export Excel"),
          h("button",{onClick:exportPDF,style:btnSecondary},"Export PDF")
        ),
        template.sections.map(section=>{
          const rows = getSectionRows(section);
          const hiddenCount = getDeletedKeys(section.no).length;
          const draft = addDraft[section.no]||{label:"",value:""};
          return h("div",{key:section.no,style:{marginBottom:2,border:"1px solid "+colors.border,borderRadius:6,overflow:"hidden",marginBottom:10}},
            h("div",{style:{background:section.bomSection?"#1c8c75":colors.dark,color:"#fff",padding:"6px 14px",fontSize:12,fontWeight:700,display:"flex",justifyContent:"space-between"}},
              h("span",null,section.no+". "+(section.bomSection?"Material Data":section.title)),
              section.bomSection&&h("span",{style:{fontWeight:400,opacity:0.85}},"rebuilt from "+mocLines.length+" ticked lines")
            ),
            rows.length===0
              ? h("div",{style:{padding:"10px 14px",fontSize:12,color:colors.mutedLight}},section.bomSection?"No lines ticked \"Show in MOC\" yet.":"No fields in this section.")
              : rows.map(row=>h("div",{key:row.key,style:{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",fontSize:12.5,borderTop:"1px solid #f0efe8"}},
                  h("div",{style:{width:220,color:colors.muted,flexShrink:0}},row.label),
                  h("div",{style:{flex:1,color:row.value?colors.text:colors.mutedLight}}, row.value||"— not filled —"),
                  h("button",{onClick:()=>deleteRow(section.no,row),title:"Delete this line",
                    style:{border:"none",background:"none",color:colors.danger,cursor:"pointer",fontSize:14,padding:"2px 6px",flexShrink:0}},"✕")
                )),
            hiddenCount>0 && h("div",{style:{padding:"5px 14px",fontSize:11,color:colors.mutedLight,borderTop:"1px solid #f0efe8"}},
              hiddenCount+" line"+(hiddenCount>1?"s":"")+" hidden — ",
              h("span",{onClick:()=>restoreDeleted(section.no),style:{color:"#1c8c75",cursor:"pointer",textDecoration:"underline"}},"restore")
            ),
            h("div",{style:{display:"flex",gap:6,padding:"8px 14px",borderTop:"1px solid #f0efe8",background:"#faf9f4",alignItems:"center",flexWrap:"wrap"}},
              h("input",{value:draft.label,placeholder:"Label",onChange:e=>setAddDraft(d=>({...d,[section.no]:{...draft,label:e.target.value}})),
                style:{width:180,padding:"5px 8px",borderRadius:4,fontSize:12,border:"1px solid "+colors.border}}),
              h("input",{value:draft.value,placeholder:"Value",onChange:e=>setAddDraft(d=>({...d,[section.no]:{...draft,value:e.target.value}})),
                style:{flex:1,minWidth:120,padding:"5px 8px",borderRadius:4,fontSize:12,border:"1px solid "+colors.border}}),
              h("button",{onClick:()=>addLine(section.no),style:{...btnSecondary,fontSize:11,padding:"5px 10px"}},"+ Add line")
            )
          );
        })
      ),
      fillOpen && h("div",{style:{position:"fixed",inset:0,background:"rgba(20,20,20,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:90}},
        h("div",{style:{background:"#fff",borderRadius:8,width:560,maxWidth:"92vw",maxHeight:"86vh",display:"flex",flexDirection:"column"}},
          h("div",{style:{background:colors.dark,color:"#fff",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderRadius:"8px 8px 0 0"}},
            h("div",{style:{fontSize:13,fontWeight:700}},editableSections[sectionIdx].no+". "+editableSections[sectionIdx].title),
            h("button",{onClick:()=>setFillOpen(false),style:{background:"none",border:"none",color:"#fff",cursor:"pointer"}},"✕")
          ),
          h("div",{style:{padding:"14px 16px",overflowY:"auto",flex:1}},
            editableSections[sectionIdx].fields.map(field=>h("div",{key:field.key,style:{marginBottom:12}},
              h("label",{style:{fontSize:11,color:colors.muted,display:"block",marginBottom:3}},field.label),
              field.type==="auto_model"
                ? h("input",{value:model||(openLines&&openLines[0]&&openLines[0].model)||"",disabled:true,style:{...inputStyle,background:"#f4f2ea"}})
              : field.type==="dropdown"
                ? h(React.Fragment,null,
                    h("select",{value:values[field.key]!==undefined?values[field.key]:(field.default||""),onChange:e=>setField(field.key,e.target.value),style:inputStyle},
                      h("option",{value:""},"— select —"),
                      field.options.map(o=>h("option",{key:o,value:o},o)),
                      h("option",{value:"__custom__"},"Other (type below)")
                    ),
                    values[field.key]==="__custom__" && h("input",{placeholder:"Type custom value",onChange:e=>setField(field.key,e.target.value),style:{...inputStyle,marginTop:6}})
                  )
                : h("input",{value:values[field.key]!==undefined?values[field.key]:(field.default||""),onChange:e=>setField(field.key,e.target.value),style:inputStyle})
            ))
          ),
          h("div",{style:{padding:"8px 16px",borderTop:"1px solid "+colors.border,display:"flex",gap:8,justifyContent:"center"}},
            h("button",{onClick:exportExcel,style:{...btnSecondary,fontSize:11,padding:"4px 10px"}},"Export Excel"),
            h("button",{onClick:exportPDF,style:{...btnSecondary,fontSize:11,padding:"4px 10px"}},"Export PDF")
          ),
          h("div",{style:{padding:"10px 16px",borderTop:"1px solid "+colors.border,display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("button",{onClick:()=>setSectionIdx(i=>Math.max(0,i-1)),disabled:sectionIdx===0,style:{...btnSecondary,opacity:sectionIdx===0?0.4:1}},"Back"),
            h("span",{style:{fontSize:11,color:colors.mutedLight}},"Section "+(sectionIdx+1)+" of "+editableSections.length),
            sectionIdx<editableSections.length-1
              ? h("button",{onClick:()=>setSectionIdx(i=>Math.min(editableSections.length-1,i+1)),style:btnPrimary},"Next")
              : h("button",{onClick:async()=>{ await saveAll(); setFillOpen(false); },style:{...btnPrimary,background:"#1c8c56"}},"Save & close")
          )
        )
      )
    )
  );
}

/* ---- EXCEL PARSING HELPERS FOR DATASHEET MASTER UPLOAD ---- */
function slugKey(label){
  let s = String(label).trim().toLowerCase();
  s = s.replace(/[^a-z0-9]+/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"");
  return s;
}
function splitDropdownOptions(val){
  const parts = String(val).split(/(?:(?<=\s)\/|\/(?=\s))/).map(p=>p.trim()).filter(Boolean);
  const seen=new Set(); const out=[];
  parts.forEach(p=>{ if(!seen.has(p)){ seen.add(p); out.push(p); } });
  return out;
}
function parseDatasheetSheetAOA(aoa){
  const rows = aoa.map(r=>[0,1,2,3].map(idx=> (r[idx]===undefined||r[idx]==="") ? null : r[idx]));
  let docTitleGuess=null;
  const filtered=[];
  rows.forEach(r=>{
    const isBlank = r.every(v=>v===null);
    if(isBlank){ filtered.push(r); return; }
    if(r[2]!==null){ return; } // two-pair front-matter row (Client / Ref Number etc) — skip
    if(r[0]===null && r[1]!==null && docTitleGuess===null && filtered.length===0){ docTitleGuess=String(r[1]); return; }
    filtered.push(r);
  });
  const n=filtered.length; let i=0; const sections=[]; let sectionNoAuto=0;
  while(i<n){
    const r=filtered[i];
    if(r.every(v=>v===null)){ i++; continue; }
    const title=r[0]; const secnoCell=r[1];
    const secno=(typeof secnoCell==="number")?secnoCell:null;
    sectionNoAuto++;
    const secnoFinal = secno!==null?secno:sectionNoAuto;
    if(secno!==null) sectionNoAuto=secno;
    const fields=[]; i++;
    while(i<n && !filtered[i].every(v=>v===null)){
      const fr=filtered[i];
      if(fr[0]!==null) fields.push([String(fr[0]).trim(), fr[1]]);
      i++;
    }
    sections.push({no:secnoFinal, title:String(title).trim(), fields});
  }
  return {docTitleGuess, sections};
}
function parseHelperSheetAOA(aoa){
  // Helper sheet layout: row1 = section headers (optional/unreliable spans),
  // row2 = field labels (one per column, must line up with the DataSheet sheet's
  // field labels), row3+ = one example configuration per row (e.g. one per
  // standard model series). We read, per column, the set of distinct example
  // values ever used — that becomes the field's dropdown option list.
  const fields=[];
  if(!aoa || aoa.length<2) return fields;
  const labelRow = aoa[1]||[];
  const maxCol = labelRow.length;
  for(let c=0;c<maxCol;c++){
    const lbl = labelRow[c];
    if(lbl==null || String(lbl).trim()==="") continue;
    const seen=new Set(); const distinct=[];
    for(let r=2;r<aoa.length;r++){
      const v = aoa[r] && aoa[r][c];
      if(v!=null && String(v).trim()!==""){ const s=String(v).trim(); if(!seen.has(s)){ seen.add(s); distinct.push(s); } }
    }
    fields.push({ label:String(lbl).trim(), norm:normalizeItemName(lbl), distinct });
  }
  return fields;
}
function buildMasterRowsFromParse(item, sections, helperFields){
  const helperByNorm = new Map(helperFields.map(hf=>[hf.norm, hf]));
  const knownLabels = new Set();
  sections.forEach(sec=>sec.fields.forEach(([label])=>knownLabels.add(normalizeItemName(label))));

  const finalSections = sections.map(sec=>{
    const isBom = sec.title.trim().toLowerCase()==="material data";
    const fields = sec.fields.map(([label,val])=>{
      const key = slugKey(label);
      const hf = key==="model" ? null : helperByNorm.get(normalizeItemName(label));
      let field_type="text", options=null, bom_match=null, default_value=null;
      if(key==="model"){ field_type="auto_model"; }
      else if(hf){
        if(hf.distinct.length>=2){ field_type="dropdown"; options=hf.distinct.join("|"); }
        else if(hf.distinct.length===1){ field_type="text"; default_value=hf.distinct[0]; }
        else if(isBom){ field_type="bom"; bom_match=label.toLowerCase(); }
        else if(typeof val==="string" && /(?:(?<=\s)\/|\/(?=\s))/.test(val)){
          const opts=splitDropdownOptions(val);
          if(opts.length>1){ field_type="dropdown"; options=opts.join("|"); } else { field_type="text"; default_value=val; }
        } else if(val!=null && val!==""){ field_type="text"; default_value=String(val); }
      } else if(isBom){ field_type="bom"; bom_match=label.toLowerCase(); }
      else if(typeof val==="string" && /(?:(?<=\s)\/|\/(?=\s))/.test(val)){
        const opts=splitDropdownOptions(val);
        if(opts.length>1){ field_type="dropdown"; options=opts.join("|"); } else { field_type="text"; default_value=val; }
      } else if(val!=null && val!==""){ field_type="text"; default_value=String(val); }
      return { label, key, field_type, options, bom_match, default_value };
    });
    return { no:sec.no, title: isBom?"Material Data":sec.title, isBom, fields };
  });

  // Insert Helper-only fields (present in the Helper sheet but absent from the
  // DataSheet sheet entirely) right after their nearest preceding known neighbor.
  const secByNo = new Map(finalSections.map(s=>[s.no,s]));
  const labelPosition = new Map();
  finalSections.forEach(s=>s.fields.forEach((e,idx)=>labelPosition.set(normalizeItemName(e.label),[s.no,idx])));
  let prevKnown=null;
  helperFields.forEach(hf=>{
    if(knownLabels.has(hf.norm)){ prevKnown = hf.norm; return; }
    if(prevKnown===null) return;
    const pos = labelPosition.get(prevKnown); if(!pos) return;
    const [secno, idx] = pos;
    const sec = secByNo.get(secno);
    let field_type="text", options=null, default_value=null;
    if(hf.distinct.length>=2){ field_type="dropdown"; options=hf.distinct.join("|"); }
    else if(hf.distinct.length===1){ field_type="text"; default_value=hf.distinct[0]; }
    sec.fields.splice(idx+1, 0, { label:hf.label, key:slugKey(hf.label), field_type, options, bom_match:null, default_value });
    sec.fields.forEach((e,i2)=>labelPosition.set(normalizeItemName(e.label),[secno,i2]));
  });

  const rows=[]; let order=0;
  finalSections.forEach(sec=>{
    sec.fields.forEach(f=>{
      order++;
      rows.push({ item, section_no:sec.no, section_title:sec.title, section_is_bom:sec.isBom, field_key:f.key, field_label:f.label, field_type:f.field_type, field_order:order, bom_match:f.bom_match, options:f.options, default_value:f.default_value });
    });
  });
  return rows;
}

/* ---- DATASHEET MASTER EDITOR (admin) ----
   Drag-and-drop an Excel file (sheet 1 = the datasheet layout, sheet 2 = optional
   helper sheet of dropdown option lists) to build or replace an item's datasheet
   master in one go. Fields can also be added or removed by hand below. */
function DatasheetMasterEditor({ onGoToTab }){
  const [itemMasterList,setItemMasterList] = useState([]); // [{item, hsn_code}] from item_tbl
  const [itemsWithMaster,setItemsWithMaster] = useState(new Set());
  const [selectedItem,setSelectedItem] = useState("");
  const [fields,setFields] = useState([]);
  const [loading,setLoading] = useState(false);
  const [dragOver,setDragOver] = useState(false);
  const [parsing,setParsing] = useState(false);
  const [previewItem,setPreviewItem] = useState("");
  const [previewRows,setPreviewRows] = useState(null);
  const [parseMsg,setParseMsg] = useState("");
  const [savingPreview,setSavingPreview] = useState(false);
  const [newItemHsn,setNewItemHsn] = useState("");
  const [addingItem,setAddingItem] = useState(false);
  const fileInputRef = useRef(null);

  const [addSecNo,setAddSecNo]=useState(1); const [addSecTitle,setAddSecTitle]=useState("");
  const [addIsBom,setAddIsBom]=useState(false); const [addLabel,setAddLabel]=useState("");
  const [addType,setAddType]=useState("text"); const [addOptions,setAddOptions]=useState("");
  const [addBomMatch,setAddBomMatch]=useState(""); const [addDefault,setAddDefault]=useState("");

  const [mastersSummary,setMastersSummary] = useState([]); // [{item, count}]
  const loadItems = useCallback(async()=>{
    const [{ data: masterItems }, { data: dsRows }] = await Promise.all([
      sb.from("item_tbl").select("item,hsn_code").order("item"),
      sb.from("datasheet_master_fields").select("item"),
    ]);
    setItemMasterList(masterItems||[]);
    setItemsWithMaster(new Set((dsRows||[]).map(r=>normalizeItemName(r.item))));
    const counts = new Map();
    (dsRows||[]).forEach(r=>counts.set(r.item, (counts.get(r.item)||0)+1));
    setMastersSummary(Array.from(counts.entries()).map(([item,count])=>({item,count})).sort((a,b)=>a.item.localeCompare(b.item)));
  },[]);
  useEffect(()=>{ loadItems(); },[loadItems]);

  const loadFields = useCallback(async(item)=>{
    if(!item){ setFields([]); return; }
    setLoading(true);
    const { data } = await sb.from("datasheet_master_fields").select("*").eq("item",item).order("field_order");
    setFields(data||[]); setLoading(false);
  },[]);
  useEffect(()=>{ loadFields(selectedItem); },[selectedItem,loadFields]);

  const deleteField = async(row)=>{
    if(!confirm("Delete field \""+row.field_label+"\"?")) return;
    await sb.from("datasheet_master_fields").delete().eq("id",row.id);
    await logAudit("DELETE","datasheet_master_fields",row.id,row.item+" — "+row.field_label,"admin",row,null);
    loadFields(selectedItem);
  };

  const [deletingMaster,setDeletingMaster] = useState(false);
  const deleteEntireMaster = async()=>{
    if(!selectedItem) return;
    if(!confirm("Delete the ENTIRE datasheet master for \""+selectedItem+"\" ("+fields.length+" fields)? This can't be undone — you'll need to drop in a fresh Excel file or rebuild it by hand afterward. Datasheets already saved on existing estimates for this item are not affected.")) return;
    setDeletingMaster(true);
    try {
      await sb.from("datasheet_master_fields").delete().eq("item",selectedItem);
      await logAudit("DELETE_ALL","datasheet_master_fields",selectedItem,"Deleted entire datasheet master for \""+selectedItem+"\" ("+fields.length+" fields)","admin",{item:selectedItem,count:fields.length},null);
      loadFields(selectedItem); loadItems();
    } catch(e){ alert("Delete failed: "+(e.message||"unknown")); }
    finally{ setDeletingMaster(false); }
  };

  const [editingId,setEditingId] = useState(null);
  const [editDraft,setEditDraft] = useState(null);
  const startEdit = (row)=>{ setEditingId(row.id); setEditDraft({ field_label:row.field_label, field_type:row.field_type, options:row.options||"", bom_match:row.bom_match||"", default_value:row.default_value||"" }); };
  const cancelEdit = ()=>{ setEditingId(null); setEditDraft(null); };
  const saveEdit = async(row)=>{
    const patch = {
      field_label: editDraft.field_label.trim()||row.field_label,
      field_type: editDraft.field_type,
      options: editDraft.field_type==="dropdown" ? editDraft.options.split("|").map(s=>s.trim()).filter(Boolean).join("|") : null,
      bom_match: editDraft.field_type==="bom" ? (editDraft.bom_match.trim()||row.field_label.toLowerCase()) : null,
      default_value: editDraft.default_value.trim()||null,
    };
    await sb.from("datasheet_master_fields").update(patch).eq("id",row.id);
    await logAudit("EDIT","datasheet_master_fields",row.id,row.item+" — "+row.field_label,"admin",row,{...row,...patch});
    setEditingId(null); setEditDraft(null);
    loadFields(selectedItem);
  };

  const addField = async()=>{
    if(!selectedItem||!addLabel.trim()) return;
    const row = {
      item: selectedItem, section_no:Number(addSecNo)||1, section_title:addSecTitle.trim()||"Section "+addSecNo,
      section_is_bom: addIsBom, field_key: slugKey(addLabel), field_label: addLabel.trim(),
      field_type: addIsBom?"bom":addType, field_order: (fields.length?Math.max(...fields.map(f=>f.field_order||0)):0)+1,
      bom_match: addIsBom?(addBomMatch.trim()||addLabel.trim().toLowerCase()):null,
      options: addType==="dropdown"&&!addIsBom?addOptions.split("|").map(s=>s.trim()).filter(Boolean).join("|"):null,
      default_value: addDefault.trim()||null,
    };
    await sb.from("datasheet_master_fields").upsert(row,{onConflict:"item,field_key"});
    setAddLabel(""); setAddOptions(""); setAddBomMatch(""); setAddDefault(""); setAddIsBom(false); setAddType("text");
    loadFields(selectedItem); loadItems();
  };

  const handleFile = async(file)=>{
    if(!file) return;
    setParsing(true); setParseMsg("");
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf,{type:"array"});
      const sheet1 = wb.Sheets[wb.SheetNames[0]];
      const aoa1 = XLSX.utils.sheet_to_json(sheet1,{header:1,defval:null});
      const { sections } = parseDatasheetSheetAOA(aoa1);
      let helperFields = [];
      if(wb.SheetNames.length>1){
        const sheet2 = wb.Sheets[wb.SheetNames[1]];
        const aoa2 = XLSX.utils.sheet_to_json(sheet2,{header:1,defval:null});
        if(aoa2 && aoa2.length>1) helperFields = parseHelperSheetAOA(aoa2);
      }
      // guess item name from the "Item" field's default value, if present
      let guess = "";
      sections.forEach(sec=>sec.fields.forEach(([label,val])=>{ if(!guess && String(label).trim().toLowerCase()==="item" && val) guess = String(val).replace(/\s+/g," ").trim(); }));
      const rows = buildMasterRowsFromParse(guess||"", sections, helperFields);
      if(rows.length===0){ setParseMsg("Couldn't find any fields in that file — check it matches the expected layout (label in column A, value/example in column B, blank row before each section header)."); setParsing(false); return; }
      setPreviewItem(guess);
      setPreviewRows(rows);
    } catch(e){ setParseMsg("Couldn't read that file: "+(e.message||"unknown error")); }
    finally{ setParsing(false); }
  };

  const matchedMasterItem = useMemo(()=>{
    const norm = normalizeItemName(previewItem);
    return itemMasterList.find(i=>normalizeItemName(i.item)===norm) || null;
  },[previewItem, itemMasterList]);

  const addItemToMaster = async()=>{
    const name = previewItem.trim();
    if(!name) return;
    setAddingItem(true);
    try {
      await sb.from("item_tbl").insert({ item:name, hsn_code: newItemHsn.trim()||null });
      await logAudit("CREATE","item_tbl",name,"Added item \""+name+"\" from Datasheet Master upload","admin",null,{item:name,hsn_code:newItemHsn});
      setNewItemHsn("");
      await loadItems();
    } catch(e){ setParseMsg("Couldn't add item: "+(e.message||"unknown")); }
    finally{ setAddingItem(false); }
  };

  const savePreview = async()=>{
    if(!matchedMasterItem){ setParseMsg("This item isn't in your Items master yet — add it below before saving."); return; }
    const item = matchedMasterItem.item; // use the master's exact spelling/casing
    setSavingPreview(true);
    try {
      await sb.from("datasheet_master_fields").delete().eq("item",item);
      const rows = previewRows.map(r=>({...r,item}));
      const { error } = await sb.from("datasheet_master_fields").insert(rows);
      if(error) throw error;
      await logAudit("UPLOAD","datasheet_master_fields",item,"Replaced datasheet master for "+item+" ("+rows.length+" fields) from Excel upload","admin",null,{count:rows.length});
      setPreviewRows(null); setPreviewItem("");
      await loadItems(); setSelectedItem(item); loadFields(item);
    } catch(e){ setParseMsg("Save failed: "+(e.message||"unknown")); }
    finally{ setSavingPreview(false); }
  };

  const updatePreviewRow = (idx,field,val)=> setPreviewRows(rs=>rs.map((r,i)=>i===idx?{...r,[field]:val}:r));
  const removePreviewRow = (idx)=> setPreviewRows(rs=>rs.filter((_,i)=>i!==idx));

  const grouped = useMemo(()=>{
    const m=new Map();
    fields.forEach(f=>{ if(!m.has(f.section_no)) m.set(f.section_no,{no:f.section_no,title:f.section_title,isBom:f.section_is_bom,rows:[]}); m.get(f.section_no).rows.push(f); });
    return Array.from(m.values()).sort((a,b)=>a.no-b.no);
  },[fields]);

  return h("div",{style:{padding:"20px 24px"}},
    h("h2",{style:{margin:"0 0 4px",fontSize:18,fontWeight:700}},"Datasheet Master"),
    h("div",{style:{fontSize:12.5,color:colors.muted,marginBottom:16}},"One master per item. Drop an Excel file to build or replace it, or add fields by hand below. The Quotes \"Datasheet\" button reads straight from here."),

    // Drag & drop upload zone
    h("div",{
      onDragOver:e=>{e.preventDefault();setDragOver(true);},
      onDragLeave:()=>setDragOver(false),
      onDrop:e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files&&e.dataTransfer.files[0];if(f) handleFile(f);},
      onClick:()=>fileInputRef.current&&fileInputRef.current.click(),
      style:{border:"2px dashed "+(dragOver?colors.accent:colors.border),borderRadius:8,padding:"28px 20px",textAlign:"center",cursor:"pointer",background:dragOver?"#fbf6e8":"#fff",marginBottom:16}
    },
      h("input",{ref:fileInputRef,type:"file",accept:".xlsx,.xls",style:{display:"none"},onChange:e=>{const f=e.target.files&&e.target.files[0];if(f) handleFile(f); e.target.value="";}}),
      h("div",{style:{fontSize:13,fontWeight:600,marginBottom:4}}, parsing?"Reading file…":"Drag & drop an Excel file here, or click to choose one"),
      h("div",{style:{fontSize:11,color:colors.mutedLight}},"Sheet 1 (\"DataSheet\"): layout, label in column A, example value in column B. Sheet 2 (\"Helper\", optional): row 1 = section headers, row 2 = field labels matching sheet 1, each row after that = one example configuration — every distinct value used becomes a dropdown option for that field.")
    ),
    parseMsg && h("div",{style:{fontSize:12,color:colors.danger,marginBottom:12}},parseMsg),

    // Existing masters — what's already built, click to open
    h("div",{style:{marginBottom:20}},
      h("div",{style:{fontSize:13,fontWeight:700,marginBottom:8}},"Existing Datasheet Masters ("+mastersSummary.length+")"),
      mastersSummary.length===0
        ? h("div",{style:{fontSize:12.5,color:colors.mutedLight}},"None yet — drop an Excel file above to build your first one.")
        : h("div",{style:{border:"1px solid "+colors.border,borderRadius:8,overflow:"hidden"}},
            mastersSummary.map(m=>h("div",{key:m.item,onClick:()=>setSelectedItem(m.item),
              style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",fontSize:13,cursor:"pointer",borderTop:"1px solid #f0efe8",
                background: normalizeItemName(selectedItem)===normalizeItemName(m.item)?"#eaf9f4":"#fff"}},
              h("span",null,m.item),
              h("span",{style:{fontSize:11.5,color:colors.mutedLight}},m.count+" fields  →")
            ))
          )
    ),

    // Preview before committing
    previewRows && h("div",{style:{border:"1px solid "+colors.accent,borderRadius:8,padding:16,marginBottom:20,background:"#fffdf6"}},
      h("div",{style:{display:"flex",gap:10,alignItems:"center",marginBottom:8,flexWrap:"wrap"}},
        h("label",{style:{fontSize:12,color:colors.muted}},"Item name:"),
        h("input",{value:previewItem,onChange:e=>setPreviewItem(e.target.value),style:{...inputStyle,width:220}}),
        h("span",{style:{fontSize:11,color:colors.mutedLight}},previewRows.length+" fields parsed — review and fix anything before saving"),
        h("div",{style:{flex:1}}),
        h("button",{onClick:()=>{setPreviewRows(null);setPreviewItem("");},style:btnSecondary},"Discard"),
        h("button",{onClick:savePreview,disabled:savingPreview||!matchedMasterItem,style:{...btnPrimary,opacity:matchedMasterItem?1:0.5}},savingPreview?"Saving…":"Save to Master")
      ),
      matchedMasterItem
        ? h("div",{style:{fontSize:11.5,color:"#1c8c56",marginBottom:12}},"✓ Matches \""+matchedMasterItem.item+"\" in your Items master.")
        : h("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:12,padding:"8px 10px",background:"#fde8e8",border:"1px solid #e5484d",borderRadius:6,flexWrap:"wrap"}},
            h("span",{style:{fontSize:11.5,color:"#7a1f1f"}},"\""+(previewItem||"(blank)")+"\" isn't in your Items master yet — add it there first so estimates and this datasheet stay linked to the same item."),
            h("input",{placeholder:"HSN code (optional)",value:newItemHsn,onChange:e=>setNewItemHsn(e.target.value),style:{...inputStyle,width:140}}),
            h("button",{onClick:addItemToMaster,disabled:addingItem||!previewItem.trim(),style:btnPrimary},addingItem?"Adding…":"Add \""+previewItem+"\" to Items master")
          ),
      h("div",{style:{maxHeight:420,overflowY:"auto",border:"1px solid "+colors.border,borderRadius:6}},
        h("table",{style:{fontSize:11.5}},
          h("thead",null,h("tr",{style:{background:"#faf9f4",textAlign:"left"}},
            ["Sec","Section title","Label","Type","Options (| sep)","BOM match","Default",""].map(c=>h("th",{key:c,style:{padding:"6px 8px"}},c))
          )),
          h("tbody",null,previewRows.map((r,idx)=>h("tr",{key:idx,style:{borderTop:"1px solid #eee",background:r.section_is_bom?"#eaf9f4":"#fff"}},
            h("td",{style:{padding:"4px 6px"}},h("input",{type:"number",value:r.section_no,onChange:e=>updatePreviewRow(idx,"section_no",Number(e.target.value)),style:{width:40,fontSize:11}})),
            h("td",{style:{padding:"4px 6px"}},h("input",{value:r.section_title,onChange:e=>updatePreviewRow(idx,"section_title",e.target.value),style:{width:120,fontSize:11}})),
            h("td",{style:{padding:"4px 6px"}},h("input",{value:r.field_label,onChange:e=>updatePreviewRow(idx,"field_label",e.target.value),style:{width:150,fontSize:11}})),
            h("td",{style:{padding:"4px 6px"}},h("select",{value:r.field_type,onChange:e=>updatePreviewRow(idx,"field_type",e.target.value),style:{fontSize:11}},["text","dropdown","bom","auto_model"].map(t=>h("option",{key:t,value:t},t)))),
            h("td",{style:{padding:"4px 6px"}},h("input",{value:r.options||"",onChange:e=>updatePreviewRow(idx,"options",e.target.value),style:{width:200,fontSize:11},disabled:r.field_type!=="dropdown"})),
            h("td",{style:{padding:"4px 6px"}},h("input",{value:r.bom_match||"",onChange:e=>updatePreviewRow(idx,"bom_match",e.target.value),style:{width:110,fontSize:11},disabled:r.field_type!=="bom"})),
            h("td",{style:{padding:"4px 6px"}},h("input",{value:r.default_value||"",onChange:e=>updatePreviewRow(idx,"default_value",e.target.value),style:{width:100,fontSize:11}})),
            h("td",{style:{padding:"4px 6px"}},h("button",{onClick:()=>removePreviewRow(idx),style:{...btnDanger,padding:"2px 6px",fontSize:10}},"✕"))
          )))
        )
      )
    ),

    h("div",{style:{display:"flex",gap:10,alignItems:"center",marginBottom:14,flexWrap:"wrap"}},
      h("label",{style:{fontSize:12,color:colors.muted}},"Manage item:"),
      h("select",{value:selectedItem,onChange:e=>setSelectedItem(e.target.value),style:{...inputStyle,width:240}},
        h("option",{value:""},"— select —"),
        itemMasterList.map(it=>h("option",{key:it.item,value:it.item},it.item+(itemsWithMaster.has(normalizeItemName(it.item))?" ✓":" (no datasheet yet)")))
      ),
      h("span",{style:{fontSize:11,color:colors.mutedLight}},"Don't see your item? Add it in the Items master first —"),
      h("button",{onClick:()=>onGoToTab&&onGoToTab("item_tbl"),style:btnSecondary},"Go to Items master")
    ),

    selectedItem && h(React.Fragment,null,
      loading?h("div",{style:{color:colors.mutedLight,fontSize:13}},"Loading…"):h(React.Fragment,null,
      fields.length>0 && h("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:8}},
        h("button",{onClick:deleteEntireMaster,disabled:deletingMaster,style:{...btnDanger,fontSize:11.5}},deletingMaster?"Deleting…":"Delete entire master for \""+selectedItem+"\" ("+fields.length+" fields)")
      ),
      h("div",{style:{border:"1px solid "+colors.border,borderRadius:8,marginBottom:16}},
        grouped.length===0 && h("div",{style:{padding:16,fontSize:12.5,color:colors.mutedLight}},"No fields yet for \""+selectedItem+"\". Drop an Excel file above, or add fields by hand below."),
        grouped.map(sec=>h("div",{key:sec.no},
          h("div",{style:{background:sec.isBom?"#1c8c75":colors.dark,color:"#fff",padding:"6px 14px",fontSize:11.5,fontWeight:700}},sec.no+". "+sec.title+(sec.isBom?"  (auto-matched from BOM)":"")),
          sec.rows.map(r=>r.id===editingId
            ? h("div",{key:r.id,style:{padding:"8px 14px",borderTop:"1px solid #f0efe8",background:"#fffdf6"}},
                h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}},
                  h("input",{value:editDraft.field_label,onChange:e=>setEditDraft(d=>({...d,field_label:e.target.value})),style:{...inputStyle,width:180,fontSize:12}}),
                  h("select",{value:editDraft.field_type,onChange:e=>setEditDraft(d=>({...d,field_type:e.target.value})),style:{...inputStyle,width:110,fontSize:12}},["text","dropdown","bom","auto_model"].map(t=>h("option",{key:t,value:t},t))),
                  editDraft.field_type==="dropdown" && h("input",{placeholder:"Options separated by |",value:editDraft.options,onChange:e=>setEditDraft(d=>({...d,options:e.target.value})),style:{...inputStyle,flex:1,minWidth:260,fontSize:12}}),
                  editDraft.field_type==="bom" && h("input",{placeholder:"BOM match keyword",value:editDraft.bom_match,onChange:e=>setEditDraft(d=>({...d,bom_match:e.target.value})),style:{...inputStyle,width:200,fontSize:12}}),
                  editDraft.field_type==="text" && h("input",{placeholder:"Default value",value:editDraft.default_value,onChange:e=>setEditDraft(d=>({...d,default_value:e.target.value})),style:{...inputStyle,width:180,fontSize:12}})
                ),
                editDraft.field_type==="dropdown" && h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}},
                  editDraft.options.split("|").map(s=>s.trim()).filter(Boolean).map((opt,oi)=>h("span",{key:oi,style:{display:"inline-flex",alignItems:"center",gap:5,background:"#eaf9f4",border:"1px solid #8fd0bf",borderRadius:12,padding:"2px 4px 2px 10px",fontSize:11}},
                    opt,
                    h("button",{onClick:()=>setEditDraft(d=>({...d,options:d.options.split("|").map(s=>s.trim()).filter(Boolean).filter((_,idx)=>idx!==oi).join("|")})),style:{background:"none",border:"none",cursor:"pointer",color:"#7a1f1f",fontSize:12,padding:"0 4px"}},"✕")
                  ))
                ),
                h("div",{style:{display:"flex",gap:8}},
                  h("button",{onClick:()=>saveEdit(r),style:{...btnPrimary,padding:"4px 10px",fontSize:11}},"Save"),
                  h("button",{onClick:cancelEdit,style:{...btnSecondary,padding:"4px 10px",fontSize:11}},"Cancel")
                )
              )
            : h("div",{key:r.id,style:{display:"flex",alignItems:"center",gap:10,padding:"5px 14px",fontSize:12,borderTop:"1px solid #f0efe8"}},
                h("div",{style:{width:200}},r.field_label),
                h("div",{style:{width:80,color:colors.mutedLight}},r.field_type),
                h("div",{style:{flex:1,color:colors.mutedLight,fontSize:11}}, r.field_type==="dropdown"?(r.options||""):r.field_type==="bom"?("match: "+(r.bom_match||"")):(r.default_value||"")),
                h("button",{onClick:()=>startEdit(r),style:{...btnSecondary,padding:"3px 8px",fontSize:10}},"Edit"),
                h("button",{onClick:()=>deleteField(r),style:{...btnDanger,padding:"3px 8px",fontSize:10}},"Delete")
              )
          )
        ))
      ),
      ),

      h("div",{style:{border:"1px solid "+colors.border,borderRadius:8,padding:14}},
        h("div",{style:{fontSize:12.5,fontWeight:600,marginBottom:10}},"Add a field to \""+selectedItem+"\""),
        h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}},
          h("input",{type:"number",placeholder:"Section #",value:addSecNo,onChange:e=>setAddSecNo(e.target.value),style:{...inputStyle,width:80}}),
          h("input",{placeholder:"Section title",value:addSecTitle,onChange:e=>setAddSecTitle(e.target.value),style:{...inputStyle,width:180}}),
          h("label",{style:{display:"flex",alignItems:"center",gap:5,fontSize:12}},h("input",{type:"checkbox",checked:addIsBom,onChange:e=>setAddIsBom(e.target.checked)}),"Material (BOM) section")
        ),
        h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}},
          h("input",{placeholder:"Field label",value:addLabel,onChange:e=>setAddLabel(e.target.value),style:{...inputStyle,width:180}}),
          !addIsBom && h("select",{value:addType,onChange:e=>setAddType(e.target.value),style:{...inputStyle,width:120}},["text","dropdown"].map(t=>h("option",{key:t,value:t},t))),
          !addIsBom && addType==="dropdown" && h("input",{placeholder:"Options separated by |",value:addOptions,onChange:e=>setAddOptions(e.target.value),style:{...inputStyle,width:260}}),
          addIsBom && h("input",{placeholder:"BOM match keyword (defaults to label)",value:addBomMatch,onChange:e=>setAddBomMatch(e.target.value),style:{...inputStyle,width:220}}),
          !addIsBom && h("input",{placeholder:"Default value (optional)",value:addDefault,onChange:e=>setAddDefault(e.target.value),style:{...inputStyle,width:180}})
        ),
        h("button",{onClick:addField,disabled:!addLabel.trim(),style:btnPrimary},"+ Add field")
      )
    )
  );
}

function SavedEstimates({ user, openTarget, onConsumedTarget }) {
  const [refs,setRefs]=useState([]); const [loading,setLoading]=useState(true);
  const [refFilter,setRefFilter]=useState(""); const [slNoFilter,setSlNoFilter]=useState(""); const [descSearch,setDescSearch]=useState(""); const [openRef,setOpenRef]=useState(null);
  const [showDatasheet,setShowDatasheet]=useState(false);
  const [openLines,setOpenLines]=useState([]); const [loadingLines,setLoadingLines]=useState(false);
  const [lineEdits,setLineEdits]=useState({}); // {refNum-slNo: {field:value}} — pending unsaved edits
  const [savingLine,setSavingLine]=useState({}); // {refNum-slNo: true} — saving in progress
  const [quoteExportRef,setQuoteExportRef]=useState(""); const [exportingQuote,setExportingQuote]=useState("");
  const [includeSalesPrice,setIncludeSalesPrice]=useState(true);

  const setLineEdit=(refNum,slNo,field,value,extraFields)=>{
    const key=refNum+"-"+slNo;
    setLineEdits(e=>({...e,[key]:{...e[key],[field]:value,...(extraFields||{})}}));
  };

  const setLineSpec=(line,newSpec)=>{
    const key=line.reference_number+"-"+line.sl_no;
    setLineEdits(e=>({...e,[key]:{...e[key],material_spec:newSpec,grade:"",rate:0}}));
  };

  const setLineGrade=(line,newGrade)=>{
    const key=line.reference_number+"-"+line.sl_no;
    const spec=getLineVal(line,"material_spec");
    const hit=spec?rateBySpecGrade.get(spec+"||"+newGrade):null;
    const autoRate=hit?hit.rate:0;
    setLineEdits(e=>({...e,[key]:{...e[key],grade:newGrade,rate:autoRate}}));
  };

  const saveLineEdit=async(line)=>{
    const key=line.reference_number+"-"+line.sl_no;
    const edits=lineEdits[key];
    if(!edits||Object.keys(edits).length===0) return;
    setSavingLine(s=>({...s,[key]:true}));
    try {
      // Always recompute cost and sales from current values (edited or stored)
      const qty=Number(edits.qty_required!==undefined?edits.qty_required:line.qty_required)||0;
      const rate=Number(edits.rate!==undefined?edits.rate:line.rate)||0;
      const sf=Number(edits.sf!==undefined?edits.sf:line.sf)||3.1;
      const cost=Number((qty*(orderQty||1)*rate).toFixed(4));
      const sales_price=Number((cost*sf).toFixed(4));
      const payload={...edits,cost,sales_price};
      await sb.from("estimate_lines").update(payload).eq("reference_number",line.reference_number).eq("item_sl_no",line.item_sl_no).eq("sl_no",line.sl_no);
      setOpenLines(ls=>ls.map(l=>l.reference_number===line.reference_number&&l.sl_no===line.sl_no?{...l,...payload}:l));
      setLineEdits(e=>{ const n={...e}; delete n[key]; return n; });
    } catch(err){ console.error("Save failed",err); }
    finally{ setSavingLine(s=>{ const n={...s}; delete n[key]; return n; }); }
  };

  const getLineVal=(line,field)=>{
    const key=line.reference_number+"-"+line.sl_no;
    const edits=lineEdits[key]||{};
    return edits[field]!==undefined?edits[field]:line[field];
  };

  const computedCost=(line)=>{
    const qty=Number(getLineVal(line,"qty_required"))||0;
    const rate=Number(getLineVal(line,"rate"))||0;
    return qty*(orderQty||1)*rate;
  };
  const computedSales=(line)=>computedCost(line)*(Number(getLineVal(line,"sf"))||3.1);
  const [showAddLine,setShowAddLine]=useState(false);
  const [savingAdd,setSavingAdd]=useState(false); const [addMsg,setAddMsg]=useState("");

  // Add line form state
  const [addModel,setAddModel]=useState("");
  const [addSubAssembly,setAddSubAssembly]=useState("");
  const [addComponent,setAddComponent]=useState("");
  const [addSpec,setAddSpec]=useState("");
  const [addGrade,setAddGrade]=useState("");
  const [addQty,setAddQty]=useState("");
  const [addUom,setAddUom]=useState("");
  const [addSf,setAddSf]=useState(3.1);

  // Master data for cascading combos
  const [bomForModel,setBomForModel]=useState([]);
  const [gradesBySpec,setGradesBySpec]=useState(new Map());
  const [rateBySpecGrade,setRateBySpecGrade]=useState(new Map());
  const [uoms,setUoms]=useState([]);
  const [allSpecs,setAllSpecs]=useState([]);
  const [modelItemMap,setModelItemMap]=useState(new Map());
  const [headerModel,setHeaderModel]=useState("");
  const [fixingModel,setFixingModel]=useState(false);

  useEffect(()=>{
    fetchAll("model_tbl","item,model").then(rows=>{
      const m=new Map();
      rows.forEach(row=>{ if(row.model) m.set(row.model, row.item||""); });
      setModelItemMap(m);
    });
  },[]);

  useEffect(()=>{
    fetchAll("material_rates","material_spec,material_grade,rate,uom").then(rows=>{
      const g=new Map(), r=new Map();
      rows.forEach(row=>{
        if(!row.material_spec||!row.material_grade) return;
        if(!g.has(row.material_spec)) g.set(row.material_spec,[]);
        g.get(row.material_spec).push({grade:row.material_grade,rate:row.rate||0});
        r.set(row.material_spec+"||"+row.material_grade,{rate:row.rate||0,uom:row.uom||""});
      });
      setGradesBySpec(g); setRateBySpecGrade(r);
    });
    fetchAll("uom_tbl","uom").then(rows=>setUoms(rows.map(r=>r.uom).filter(Boolean)));
    fetchAll("material_spec","material_spec").then(rows=>setAllSpecs(Array.from(new Set(rows.map(r=>r.material_spec).filter(Boolean))).sort()));
  },[]);

  const load=useCallback(async()=>{ setLoading(true); const{data}=await sb.from("estimates").select("*").order("created_at",{ascending:false}); setRefs(data||[]); setLoading(false); },[]);
  useEffect(()=>{load();},[load]);

  useEffect(()=>{
    if(!openTarget || loading || refs.length===0) return;
    const match = refs.find(r=>r.reference_number===openTarget.reference_number && (openTarget.item_sl_no==null || r.item_sl_no===openTarget.item_sl_no));
    if(match){ setRefFilter(match.reference_number); setSlNoFilter(String(match.item_sl_no)); openEstimate(match); }
    if(onConsumedTarget) onConsumedTarget();
  },[openTarget, loading, refs]);

  const filtered=useMemo(()=>{
    let out = refs;
    if(refFilter) out = out.filter(r=>r.reference_number===refFilter);
    if(slNoFilter) out = out.filter(r=>String(r.item_sl_no)===String(slNoFilter));
    if(descSearch){ const s=descSearch.toLowerCase(); out = out.filter(r=>(r.description||"").toLowerCase().includes(s)); }
    return out;
  },[refs,refFilter,slNoFilter,descSearch]);

  // Sl No options narrow to whichever Quote# is currently selected
  const slNoOptions = useMemo(()=>{
    const pool = refFilter ? refs.filter(r=>r.reference_number===refFilter) : refs;
    return Array.from(new Set(pool.map(r=>r.item_sl_no))).sort((a,b)=>a-b);
  },[refs,refFilter]);

  const openEstimate=async(ref)=>{
    setOpenRef(ref); setLoadingLines(true); setOrderQty(ref.order_qty||1); setLineEdits({}); setSavingLine({});
    const{data}=await sb.from("estimate_lines").select("*").eq("reference_number",ref.reference_number).eq("item_sl_no",ref.item_sl_no).order("sl_no");
    setOpenLines(data||[]); setLoadingLines(false);
    // Header Model: the estimates row is the authoritative "main form" value.
    // Older estimates saved before this field existed fall back to the first line's model.
    const m = ref.model || (data&&data[0]&&data[0].model) || "";
    setHeaderModel(m);
    setAddModel(m);
    if(m) fetchAll("bom","*").then(rows=>setBomForModel(rows.filter(r=>r.model===m)));
  };

  const fixHeaderModel = async()=>{
    if(!headerModel||!openRef) return;
    setFixingModel(true);
    try {
      await sb.from("estimates").update({model:headerModel}).eq("id",openRef.id);
      setOpenRef(r=>({...r,model:headerModel}));
      setRefs(rs=>rs.map(r=>r.id===openRef.id?{...r,model:headerModel}:r));
    } catch(e){ console.error("Fix model failed",e); }
    finally{ setFixingModel(false); }
  };

  const openAddLine = ()=>{ setAddSubAssembly(""); setAddComponent(""); setAddSpec(""); setAddGrade(""); setAddQty(""); setAddUom(""); setAddSf(3.1); setAddMsg(""); setShowAddLine(true); };

  // Cascading options derived from BOM for model
  const subAssemblyOptions = useMemo(()=>Array.from(new Set(bomForModel.map(r=>r.sub_assembly).filter(Boolean))).sort(),[bomForModel]);
  const componentOptions = useMemo(()=>{
    const pool = addSubAssembly ? bomForModel.filter(r=>r.sub_assembly===addSubAssembly) : bomForModel;
    return Array.from(new Set(pool.map(r=>r.component).filter(Boolean))).sort();
  },[bomForModel,addSubAssembly]);
  const specOptions = useMemo(()=>{
    const pool = addComponent ? bomForModel.filter(r=>r.component===addComponent) : bomForModel;
    return Array.from(new Set(pool.map(r=>r.material_spec).filter(Boolean))).sort();
  },[bomForModel,addComponent]);
  const gradeOptions = useMemo(()=>addSpec?(gradesBySpec.get(addSpec)||[]):[],[gradesBySpec,addSpec]);
  const lookedUpRate = useMemo(()=>{
    if(!addSpec||!addGrade) return null;
    const hit=rateBySpecGrade.get(addSpec+"||"+addGrade);
    return hit?hit.rate:null;
  },[rateBySpecGrade,addSpec,addGrade]);
  const previewCost = useMemo(()=>(Number(addQty)||0)*(lookedUpRate||0),[addQty,lookedUpRate]);
  const previewSales = useMemo(()=>previewCost*(Number(addSf)||3.1),[previewCost,addSf]);

  // Auto-fill qty/uom from BOM when component selected
  useEffect(()=>{
    if(!addComponent) return;
    const match = bomForModel.find(r=>r.component===addComponent&&(!addSubAssembly||r.sub_assembly===addSubAssembly));
    if(match) { setAddQty(match.qty_required||""); setAddUom(match.uom||""); setAddSpec(match.material_spec||""); }
  },[addComponent]);
  useEffect(()=>{ setAddGrade(""); },[addSpec]);

  const saveAddLine=async()=>{
    setAddMsg(""); if(!openRef) return; setSavingAdd(true);
    try {
      const nextSl=(openLines.length>0?Math.max(...openLines.map(l=>l.sl_no)):0)+1;
      const rate=lookedUpRate!==null?lookedUpRate:(0);
      // Look up material_shape from BOM for this component/spec
      const bomMatch=bomForModel.find(r=>r.component===addComponent&&r.material_spec===addSpec);
      const materialShape=bomMatch?bomMatch.material_shape||"":"";
      const payload={
        reference_number:openRef.reference_number, item_sl_no:openRef.item_sl_no, sl_no:nextSl, estimate_id:openRef.id,
        model:addModel, sub_assembly:addSubAssembly, component:addComponent,
        material_shape:materialShape,
        material_spec:addSpec, grade:addGrade, qty_required:Number(addQty)||0,
        uom:addUom, rate, cost:(Number(addQty)||0)*rate, sf:Number(addSf)||3.1,
        sales_price:(Number(addSf)||3.1)*(Number(addQty)||0)*rate
      };
      const{data,error:err}=await sb.from("estimate_lines").insert(payload).select().single();
      if(err) throw err;
      setOpenLines(l=>[...l,data]);
      setAddSubAssembly(""); setAddComponent(""); setAddSpec(""); setAddGrade(""); setAddQty(""); setAddUom(""); setAddSf(3.1);
      setAddMsg("Line added as Sl No "+nextSl+".");
    } catch(e){setAddMsg("Failed: "+e.message);} finally{setSavingAdd(false);}
  };

  const deleteEstimateLine=async(refNumber,itemSlNo,slNo)=>{
    if(!confirm("Delete Sl No "+slNo+"?")) return;
    const{data:rowData}=await sb.from("estimate_lines").select("*").eq("reference_number",refNumber).eq("item_sl_no",itemSlNo).eq("sl_no",slNo).single();
    await sb.from("estimate_lines").delete().eq("reference_number",refNumber).eq("item_sl_no",itemSlNo).eq("sl_no",slNo);
    await logAudit("DELETE","estimate_lines",refNumber+"-"+itemSlNo+"-"+slNo,"Quote#: "+refNumber+" Sl: "+itemSlNo+" Line: "+slNo+(rowData?.component?" — "+rowData.component:""),user?.username||"unknown",rowData,null);
    setOpenLines(l=>l.filter(x=>!(x.reference_number===refNumber&&x.item_sl_no===itemSlNo&&x.sl_no===slNo)));
  };

  const [orderQty,setOrderQty]=useState(1);
  const totalCost=useMemo(()=>openLines.reduce((s,l)=>{
    const qty=(Number(getLineVal(l,"qty_required"))||0)*(orderQty||1);
    const rate=Number(getLineVal(l,"rate"))||0;
    return s+qty*rate;
  },0),[openLines,lineEdits,orderQty]);
  const totalSales=useMemo(()=>openLines.reduce((s,l)=>{
    const qty=(Number(getLineVal(l,"qty_required"))||0)*(orderQty||1);
    const rate=Number(getLineVal(l,"rate"))||0;
    const sf=Number(getLineVal(l,"sf"))||3.1;
    return s+qty*rate*sf;
  },0),[openLines,lineEdits,orderQty]);
  const totalOrderCost=totalCost;
  const totalOrderSales=totalSales;
  const updateOrderQty=async(val)=>{
    const n=Number(val)||1; setOrderQty(n);
    if(openRef) await sb.from("estimates").update({order_qty:n}).eq("id",openRef.id);
  };
  const [showSummarySaved,setShowSummarySaved]=useState(false);
  const savedSummaryRows=useMemo(()=>{
    const map=new Map();
    openLines.forEach(l=>{
      const shape=(l.material_shape||"").toUpperCase()||"OTHER";
      const key=shape+"|||"+(l.material_spec||"(no spec)")+"|||"+(l.grade||"(no grade)");
      if(!map.has(key)) map.set(key,{shape,spec:l.material_spec||"(no spec)",grade:l.grade||"",uom:l.uom||"",rate:Number(l.rate)||0,totalQty:0,totalCost:0,totalSales:0,lineCount:0});
      const g=map.get(key);
      const qtyByOrder=(Number(l.qty_required)||0)*(orderQty||1);
      g.totalQty+=qtyByOrder;
      g.totalCost+=qtyByOrder*(Number(l.rate)||0);
      g.totalSales+=qtyByOrder*(Number(l.rate)||0)*(Number(l.sf)||3.1);
      g.lineCount+=1;
    });
    return Array.from(map.values()).sort((a,b)=>a.shape.localeCompare(b.shape)||a.spec.localeCompare(b.spec));
  },[openLines,orderQty]);

  const exportXlsx=()=>{
    const headers=["Sl No","Model","Component","Material Spec","Grade","Qty","UOM","Rate","Cost","Sf","Sales Price"];
    const rows=openLines.map(l=>[l.sl_no,l.model,l.component,l.material_spec,l.grade,l.qty_required,l.uom,l.rate,l.cost,l.sf,l.sales_price]);
    rows.push(["","","","","","","","TOTAL",Number(totalCost.toFixed(2)),"",Number(totalSales.toFixed(2))]);
    const ws=XLSX.utils.aoa_to_sheet([headers].concat(rows));
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Estimate");
    XLSX.writeFile(wb,"estimate_"+openRef.reference_number+"_sl"+openRef.item_sl_no+".xlsx");
  };
  const exportSummaryXlsxSaved=()=>{
    const headers=["#","Shape","Material spec","Grade","Total qty","UOM","Rate","Total cost","Total sales price","Lines"];
    let idx=0; const rows=[]; let lastShape="";
    savedSummaryRows.forEach(r=>{
      if(r.shape!==lastShape){ rows.push(["",r.shape,"","","","","","","",""]); lastShape=r.shape; }
      idx++;
      rows.push([idx,r.shape,r.spec,r.grade||"(no grade)",Number(r.totalQty.toFixed(3)),r.uom,Number(r.rate.toFixed(2)),Number(r.totalCost.toFixed(2)),Number(r.totalSales.toFixed(2)),r.lineCount]);
    });
    rows.push(["","TOTAL","","","","","",Number(totalCost.toFixed(2)),Number(totalSales.toFixed(2)),openLines.length]);
    const ws=XLSX.utils.aoa_to_sheet([headers].concat(rows));
    ws["!cols"]=[{wch:5},{wch:14},{wch:36},{wch:22},{wch:12},{wch:8},{wch:10},{wch:14},{wch:16},{wch:7}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Summary BOM");
    XLSX.writeFile(wb,"summary_"+openRef.reference_number+"_sl"+openRef.item_sl_no+".xlsx");
  };
  const exportPDF=()=>{
    const headers=["Sl","Model","Component","Material Spec","Grade","Qty","UOM","Rate","Cost","Sf","Sales Price"];
    const rows=openLines.map(l=>[l.sl_no,l.model||"",l.component||"",l.material_spec||"",l.grade||"",l.qty_required,l.uom||"",fmt(Number(l.rate)||0),fmt(Number(l.cost)||0),l.sf,fmt(Number(l.sales_price)||0)]);
    generatePDF({title:"Estimate",refNumber:openRef.reference_number+" — Sl No "+openRef.item_sl_no,description:openRef.description,createdBy:openRef.created_by,createdAt:openRef.created_at,headers,rows,footerRows:[["","","","","","","","Total",fmt(totalCost),"",fmt(totalSales)]],filename:"estimate_"+openRef.reference_number+"_sl"+openRef.item_sl_no+".pdf"});
  };
  const exportSummaryPDFSaved=()=>{
    const today=new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
    const { jsPDF }=window.jspdf;
    const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
    const W=doc.internal.pageSize.getWidth();
    const dark=[28,31,26];
    const neutral=[244,242,234];
    const drawLetterhead=()=>{
      try { doc.addImage(COMPANY_LOGO,"PNG",10,4,40,20); } catch(e){}
      doc.setFontSize(11); doc.setTextColor(...dark); doc.setFont(undefined,"bold");
      doc.text(COMPANY_NAME,W-14,8,{align:"right"});
      doc.setFontSize(7); doc.setFont(undefined,"normal"); doc.setTextColor(100,100,100);
      doc.text(COMPANY_ADDRESS,W-14,13,{align:"right"});
      doc.text(COMPANY_WEBSITE+"   |   "+COMPANY_EMAIL,W-14,17.5,{align:"right"});
      doc.setFontSize(8.5); doc.setTextColor(...dark); doc.setFont(undefined,"bold");
      doc.text("SUMMARY BOM",W-14,23,{align:"right"});
      doc.setDrawColor(200,197,185); doc.setLineWidth(0.4);
      doc.line(10,27,W-10,27);
    };
    drawLetterhead();
    doc.setTextColor(...dark); doc.setFontSize(9); let y=34;
    const lbl=(l,v)=>{ doc.setFont(undefined,"bold"); doc.text(l+":",12,y); doc.setFont(undefined,"normal"); doc.text(String(v||""),42,y); y+=6; };
    lbl("Quote#",openRef.reference_number+" — Sl No "+openRef.item_sl_no);
    if(openRef.description) lbl("Description",openRef.description);
    lbl("Date",today); lbl("Prepared by",openRef.created_by||"");
    const tableHead=[["#","Material spec","Grade","Total qty","UOM","Rate","Total cost","Total sales price","Lines"]];
    const tableBody=[]; let idx=0; let lastShape="";
    savedSummaryRows.forEach(r=>{
      if(r.shape!==lastShape){ tableBody.push([{content:r.shape,colSpan:9,styles:{fillColor:neutral,textColor:dark,fontStyle:"bold",fontSize:8}}]); lastShape=r.shape; }
      idx++;
      tableBody.push([idx,r.spec,r.grade||"(no grade)",r.totalQty%1===0?String(r.totalQty):r.totalQty.toFixed(3),r.uom,fmt(r.rate),fmt(r.totalCost),fmt(r.totalSales),r.lineCount]);
    });
    doc.autoTable({
      startY:y+2, head:tableHead, body:tableBody,
      foot:[[{content:"TOTAL — "+savedSummaryRows.length+" groups from "+openLines.length+" lines",colSpan:6,styles:{fontStyle:"normal",textColor:[100,100,100]}},fmt(totalCost),fmt(totalSales),""]],
      theme:"grid",
      headStyles:{fillColor:neutral,textColor:dark,fontStyle:"bold",fontSize:8,lineColor:[216,212,197],lineWidth:0.2},
      footStyles:{fillColor:neutral,textColor:dark,fontStyle:"bold",fontSize:8},
      bodyStyles:{fontSize:7.5,textColor:dark},
      alternateRowStyles:{fillColor:[250,249,245]},
      margin:{top:32,left:10,right:10,bottom:15},
      didDrawPage:drawLetterhead,
    });
    const pageCount=doc.internal.getNumberOfPages();
    for(let i=1;i<=pageCount;i++){
      doc.setPage(i); doc.setFontSize(7); doc.setTextColor(150);
      doc.text("Page "+i+" of "+pageCount,W-12,doc.internal.pageSize.getHeight()-5,{align:"right"});

      doc.text(COMPANY_NAME+" | Summary BOM | "+today,12,doc.internal.pageSize.getHeight()-5);
    }

  const fld=(label,note,ctrl)=>h("div",{style:{flex:1,minWidth:120}},
    h("div",{style:{fontSize:10,color:colors.muted,marginBottom:3}},label,note&&h("span",{style:{color:colors.mutedLight,marginLeft:4}},note)),
    ctrl
  );
  const sel=(val,onChange,options,placeholder)=>h("select",{value:val||"",onChange:e=>onChange(e.target.value),style:{...inputStyle,padding:"7px 9px",fontSize:12}},
    h("option",{value:""},placeholder||"—"),
    options.map(o=>h("option",{key:o,value:o},o))
  );

  // ---- Quote-wide exports: pull every Sl No under one Quote# together ----
  const fetchQuoteBundle = async(ref)=>{
    const [{data:estimatesRows},{data:linesRows},{data:datasheetsRows}] = await Promise.all([
      sb.from("estimates").select("*").eq("reference_number",ref).order("item_sl_no"),
      sb.from("estimate_lines").select("*").eq("reference_number",ref).order("item_sl_no").order("sl_no"),
      sb.from("datasheets").select("*").eq("reference_number",ref)
    ]);
    return { estimatesRows: estimatesRows||[], linesRows: linesRows||[], datasheetsRows: datasheetsRows||[] };
  };

  const bomHeaders = (withSales)=> withSales
    ? ["Component","Sub Assembly","Material spec","Grade","Reqd Qty/ Unit","UOM","Total Qty","Rate","Sf","Cost","Sales price"]
    : ["Component","Sub Assembly","Material spec","Grade","Reqd Qty/ Unit","UOM","Total Qty","Rate","Cost"];
  // Column A ("Component" header) is always blank on data rows — the sub-assembly
  // name is shown once as its own group-header row instead. Column B ("Sub
  // Assembly" header) carries the line's own component value.
  const bomDataRow = (l, orderQtyForSl, withSales)=>{
    const qtyReqd = r2(l.qty_required);
    const qtyByOrder = r2(qtyReqd*(orderQtyForSl||1));
    const rate = r2(l.rate);
    const sf = r2(l.sf||3.1);
    const cost = r2(qtyByOrder*rate);
    const row = ["", l.sub_assembly||"", l.material_spec||"", l.grade||"", qtyReqd, l.uom||"", qtyByOrder, rate];
    if(withSales) row.push(sf);
    row.push(cost);
    if(withSales) row.push(r2(cost*sf));
    return row;
  };
  const groupByComponent = (lines)=>{
    const order=[]; const map=new Map();
    lines.forEach(l=>{
      const key = l.component || "(ungrouped)";
      if(!map.has(key)){ map.set(key,[]); order.push(key); }
      map.get(key).push(l);
    });
    return order.map(key=>({ component:key, lines: map.get(key) }));
  };

  const exportQuoteBOMExcel = async(withSales)=>{
    if(!quoteExportRef) return;
    setExportingQuote("bom-xlsx");
    try {
      const {estimatesRows, linesRows} = await fetchQuoteBundle(quoteExportRef);
      const customer = (estimatesRows[0]&&estimatesRows[0].description)||"";
      const wb = XLSX.utils.book_new();
      estimatesRows.forEach(est=>{
        const itemName = modelItemMap.get(est.model) || "";
        const lines = linesRows.filter(l=>l.item_sl_no===est.item_sl_no);
        const rows=[];
        rows.push(["BOM WITH ESTIMATE"]);
        rows.push([]);
        rows.push(["Sl No", est.item_sl_no, "Client", customer, "Quote date", est.quote_date||""]);
        rows.push(["Item", itemName, "Quote No", est.reference_number]);
        rows.push(["Model", est.model||"", "Qty By Order", est.order_qty||1]);
        rows.push([]);
        rows.push(bomHeaders(withSales));
        rows.push(["","","","","","","(Qty By Order x Reqd Qty)"]);
        const headerRowCount = rows.length; // for number-format start (1-indexed row after this)
        groupByComponent(lines).forEach(grp=>{
          rows.push([]);
          rows.push([grp.component]);
          rows.push([]);
          grp.lines.forEach(l=>rows.push(bomDataRow(l, est.order_qty||1, withSales)));
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws["!cols"] = [{wch:14},{wch:18},{wch:36},{wch:15},{wch:12},{wch:8},{wch:14},{wch:11},{wch:7},{wch:12},{wch:13}];
        applyNumberFormat(ws, headerRowCount+1);
        XLSX.utils.book_append_sheet(wb, ws, sanitizeSheetName("Sl"+est.item_sl_no+"-"+(est.model||"").replace(/\s+/g,"")));
      });
      XLSX.writeFile(wb, quoteExportRef.replace(/\s+/g,"_")+"_BOM"+(withSales?"":"_cost")+".xlsx");
    } finally { setExportingQuote(""); }
