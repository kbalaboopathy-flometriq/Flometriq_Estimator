  const drawQuoteLetterhead = (doc, W, title, ref, customer)=>{
    const dark=[28,31,26];
    try{ doc.addImage(COMPANY_LOGO,"PNG",10,4,36,18); }catch(e){}
    doc.setFontSize(10); doc.setTextColor(...dark); doc.setFont(undefined,"bold");
    doc.text(COMPANY_NAME,W-14,8,{align:"right"});
    doc.setFontSize(7); doc.setFont(undefined,"normal"); doc.setTextColor(100,100,100);
    doc.text(COMPANY_ADDRESS,W-14,13,{align:"right"});
    doc.text(COMPANY_WEBSITE+"   |   "+COMPANY_EMAIL,W-14,17.5,{align:"right"});
    doc.setFontSize(8.5); doc.setTextColor(...dark); doc.setFont(undefined,"bold");
    doc.text(title,W-14,23,{align:"right"});
    doc.setFontSize(8); doc.setFont(undefined,"normal");
    // Client is intentionally left off this compact line — long client names
    // would run into the right-aligned title. It's shown in full in the main
    // header block below instead.
    doc.text("Quote#: "+ref,12,23);
    doc.setDrawColor(200,197,185); doc.setLineWidth(0.4);
    doc.line(10,27,W-10,27);
  };
  const numberQuotePages = (doc, W)=>{
    const pageCount = doc.internal.getNumberOfPages();
    for(let i=1;i<=pageCount;i++){
      doc.setPage(i); doc.setFontSize(7); doc.setTextColor(150);
      doc.text("Page "+i+" of "+pageCount, W-12, doc.internal.pageSize.getHeight()-5, {align:"right"});
    }
  };
  // The "BOM WITH ESTIMATE" / "DATA SHEET" title + Sl No/Client/Quote date/Item/
  // Quote No/Model/Qty By Order block, drawn below the company letterhead.
  // Label positions are dynamic: a long value (e.g. a long client name) pushes
  // the next label further right (or wraps to the next line) instead of the
  // two colliding. Returns the y position to continue from.
  const drawDocHeaderBlock = (doc, title, fields)=>{
    const dark=[28,31,26];
    const pageW = doc.internal.pageSize.getWidth();
    doc.setFontSize(15); doc.setTextColor(...dark); doc.setFont("times","bold");
    doc.text(title, pageW/2, 34, {align:"center"});
    let y=41;
    // Draws "label: value" starting at x, and returns the x position right
    // after the value ends (so the next field can start with a safe gap).
    const put = (x,label,value)=>{
      doc.setFont("times","bold"); doc.setFontSize(9); doc.text(label,x,y);
      const labelW = doc.getTextWidth(label);
      doc.setFont(undefined,"normal");
      const valStr = String(value||"");
      doc.text(valStr, x+labelW+3, y);
      return x+labelW+3+doc.getTextWidth(valStr);
    };
    let endX = put(12,"Sl No", fields.slNo);
    let nextX = Math.max(60, endX+8);
    endX = put(nextX,"Client", fields.client);
    nextX = Math.max(150, endX+8);
    if(nextX > pageW-14-45){ y+=6; nextX=12; }
    put(nextX,"Quote date", fields.quoteDate);
    y+=6;
    endX = put(12,"Item", fields.item);
    nextX = Math.max(60, endX+8);
    put(nextX,"Quote No", fields.quoteNo);
    y+=6;
    endX = put(12,"Model", fields.model);
    if(fields.qtyByOrder!==undefined){
      nextX = Math.max(60, endX+8);
      if(nextX > pageW-14-45){ y+=6; nextX=12; }
      put(nextX,"Qty By Order", fields.qtyByOrder);
    }
    return y+7;
  };

  // Fixed mm widths so the header row and every group's separate body table
  // line up in exactly the same columns (each autoTable call otherwise
  // auto-sizes independently, which is what caused the misalignment).
  const bomColumnWidths = (withSales)=> withSales
    ? [24,32,50,26,23,16,20,20,14,22,22]
    : [26,36,58,30,27,18,24,24,26];

  const CONTENT_TOP_Y = 32; // space reserved below the letterhead+divider, used on every continuation page
  const exportQuoteBOMPDF = async(withSales)=>{
    if(!quoteExportRef) return;
    setExportingQuote("bom-pdf");
    try {
      const {estimatesRows, linesRows} = await fetchQuoteBundle(quoteExportRef);
      const customer = (estimatesRows[0]&&estimatesRows[0].description)||"";
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
      const W = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const dark=[28,31,26];
      const headers = bomHeaders(withSales);
      const numericCols = withSales ? [4,6,7,8,9,10] : [4,6,7,8];
      const widths = bomColumnWidths(withSales);
      const columnStyles = {}; widths.forEach((w,ci)=>{ columnStyles[ci] = { cellWidth:w, halign: numericCols.includes(ci)?"right":"left" }; });
      estimatesRows.forEach((est,idx)=>{
        if(idx>0) doc.addPage();
        drawQuoteLetterhead(doc,W,"BOM WITH ESTIMATE",quoteExportRef,customer);
        const itemName = modelItemMap.get(est.model) || "";
        let y = drawDocHeaderBlock(doc,"BOM WITH ESTIMATE",{slNo:est.item_sl_no,client:customer,quoteDate:est.quote_date,item:itemName,quoteNo:est.reference_number,model:est.model,qtyByOrder:est.order_qty||1});
        const lines = linesRows.filter(l=>l.item_sl_no===est.item_sl_no);
        doc.autoTable({
          startY:y,
          head:[headers],
          body: [],
          theme:"grid",
          tableWidth:"wrap",
          styles:{font:"times",cellPadding:{top:1.5,right:3.5,bottom:1.5,left:3.5}},
          headStyles:{fillColor:[255,255,255],textColor:dark,fontStyle:"bold",fontSize:8,font:"times",lineColor:[200,200,200],lineWidth:0.2},
          bodyStyles:{fontSize:7.5,textColor:dark},
          columnStyles,
          margin:{top:CONTENT_TOP_Y,left:14,right:14,bottom:18}
        });
        y = doc.lastAutoTable.finalY;
        doc.setFont(undefined,"italic"); doc.setFontSize(7); doc.setTextColor(120,120,120);
        doc.text("(Qty By Order x Reqd Qty)", 14, y+4);
        y += 3;
        groupByComponent(lines).forEach(grp=>{
          // A group header must never be stranded alone at the bottom with its
          // data pushed to the next page — if there isn't room for the header
          // plus at least one data row, start the group fresh on a new page.
          if(y + 6 + 5 + 8 > pageH - 18){
            doc.addPage();
            drawQuoteLetterhead(doc,W,"BOM WITH ESTIMATE",quoteExportRef,customer);
            y = CONTENT_TOP_Y;
          } else {
            y += 6;
          }
          doc.setFont("times","bold"); doc.setFontSize(8.5); doc.setTextColor(...dark);
          doc.text(grp.component, 14, y);
          y += 5;
          doc.autoTable({
            startY:y,
            body: grp.lines.map(l=>bomDataRow(l, est.order_qty||1, withSales).map(v=>typeof v==="number"?fmt(v):v)),
            theme:"plain",
            tableWidth:"wrap",
            styles:{cellPadding:{top:1.2,right:3.5,bottom:1.2,left:3.5}},
            bodyStyles:{fontSize:7.5,textColor:dark},
            columnStyles,
            margin:{top:CONTENT_TOP_Y,left:14,right:14,bottom:18},
            didDrawPage:()=>{ drawQuoteLetterhead(doc,W,"BOM WITH ESTIMATE",quoteExportRef,customer); }
          });
          y = doc.lastAutoTable.finalY;
        });
      });
      numberQuotePages(doc,W);
      doc.save(quoteExportRef.replace(/\s+/g,"_")+"_BOM"+(withSales?"":"_cost")+".pdf");
    } finally { setExportingQuote(""); }
  };

  const buildQuoteDatasheetGroups = async(estimatesRows, linesRows, datasheetsRows)=>{
    const itemGroups = new Map(); // itemName -> [{slNo, model, sectionsRows}]
    for(const est of estimatesRows){
      const itemName = modelItemMap.get(est.model) || est.model || "Unknown item";
      const template = await loadDatasheetMaster(itemName);
      if(!template) continue;
      const ds = datasheetsRows.find(d=>d.item_sl_no===est.item_sl_no && d.template_key===normalizeItemName(itemName));
      const mocLines = linesRows.filter(l=>l.item_sl_no===est.item_sl_no && l.show_in_moc===true);
      const sectionsRows = buildDatasheetSectionRows(template, (ds&&ds.field_values)||{}, mocLines, est.model);
      if(!itemGroups.has(itemName)) itemGroups.set(itemName, []);
      itemGroups.get(itemName).push({ slNo: est.item_sl_no, model: est.model||"", sectionsRows });
    }
    itemGroups.forEach(instances=>instances.sort((a,b)=>a.slNo-b.slNo));
    return itemGroups;
  };

  const exportQuoteDatasheetsExcel = async()=>{
    if(!quoteExportRef) return;
    setExportingQuote("ds-xlsx");
    try {
      const {estimatesRows, linesRows, datasheetsRows} = await fetchQuoteBundle(quoteExportRef);
      const customer = (estimatesRows[0]&&estimatesRows[0].description)||"";
      const itemGroups = await buildQuoteDatasheetGroups(estimatesRows, linesRows, datasheetsRows);
      const rows = [];
      for(const [itemName, instances] of itemGroups){
        const matrix = buildItemMatrix(instances);
        rows.push(["DATA SHEET"]);
        rows.push([]);
        rows.push(["Sl No", ...instances.map(i=>i.slNo)]);
        rows.push(["Client", customer]);
        rows.push(["Item", itemName]);
        rows.push(["Quote No", estimatesRows[0]&&estimatesRows[0].reference_number]);
        rows.push(["Model", ...instances.map(i=>i.model)]);
        rows.push([]);
        rows.push(["Parameters", ...instances.map(i=>i.slNo)]);
        matrix.forEach(sec=>{
          rows.push([]);
          rows.push([sec.title]);
          sec.rowLabels.forEach((lbl,i)=>rows.push([lbl, ...sec.columns.map(c=>c.values[i])]));
        });
        rows.push([]); rows.push([]);
      }
      if(rows.length===0) rows.push(["No datasheet masters found for any item in this quote."]);
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Datasheets");
      XLSX.writeFile(wb, quoteExportRef.replace(/\s+/g,"_")+"_Datasheets.xlsx");
    } finally { setExportingQuote(""); }
  };

  const exportQuoteDatasheetsPDF = async()=>{
    if(!quoteExportRef) return;
    setExportingQuote("ds-pdf");
    try {
      const {estimatesRows, linesRows, datasheetsRows} = await fetchQuoteBundle(quoteExportRef);
      const customer = (estimatesRows[0]&&estimatesRows[0].description)||"";
      const itemGroups = await buildQuoteDatasheetGroups(estimatesRows, linesRows, datasheetsRows);
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      const W = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const dark=[28,31,26];
      let first=true;
      for(const [itemName, instances] of itemGroups){
        const matrix = buildItemMatrix(instances);
        if(!first) doc.addPage();
        first=false;
        drawQuoteLetterhead(doc,W,"DATA SHEET",quoteExportRef,customer);
        let y = drawDocHeaderBlock(doc,"DATA SHEET",{
          slNo: instances.map(i=>i.slNo).join(", "),
          client: customer, item: itemName,
          quoteNo: estimatesRows[0]&&estimatesRows[0].reference_number,
          model: instances.map(i=>i.model).join(", ")
        });
        // Fixed widths shared by the header row and every section's own table,
        // so columns line up regardless of how many separate autoTable calls draw them.
        const paramsWidth = 55;
        const colWidth = Math.max(18, (182-14-14-paramsWidth)/Math.max(1,instances.length));
        const columnStyles = {0:{cellWidth:paramsWidth}};
        instances.forEach((inst,i)=>{ columnStyles[i+1] = {cellWidth:colWidth, halign:"right"}; });
        const head=[["Parameters", ...instances.map(i=>String(i.slNo))]];
        doc.autoTable({
          startY:y, head, body:[], theme:"grid", tableWidth:"wrap",
          styles:{cellPadding:{top:1.5,right:3.5,bottom:1.5,left:3.5}},
          headStyles:{fillColor:[255,255,255],textColor:dark,fontStyle:"bold",fontSize:8,font:"times",lineColor:[200,200,200],lineWidth:0.2},
          columnStyles,
          margin:{top:CONTENT_TOP_Y,left:14,right:14,bottom:18}
        });
        y = doc.lastAutoTable.finalY;
        matrix.forEach(sec=>{
          // Keep a section title with at least its first data row — never
          // strand the title alone at the bottom with data on the next page.
          if(y + 5 + 2 + 8 > pageH - 18){
            doc.addPage();
            drawQuoteLetterhead(doc,W,"DATA SHEET",quoteExportRef,customer);
            y = CONTENT_TOP_Y;
          } else {
            y += 5;
          }
          doc.setFont("times","bold"); doc.setFontSize(8.5); doc.setTextColor(...dark);
          doc.text(sec.title, 14, y);
          const body = sec.rowLabels.map((lbl,i)=>[lbl, ...sec.columns.map(c=>c.values[i]||"")]);
          doc.autoTable({
            startY:y+2, body, theme:"plain", tableWidth:"wrap",
            styles:{cellPadding:{top:1.2,right:3.5,bottom:1.2,left:3.5}},

            columnStyles,
            margin:{top:CONTENT_TOP_Y,left:14,right:14,bottom:18},
            didDrawPage:()=>{ drawQuoteLetterhead(doc,W,"DATA SHEET",quoteExportRef,customer); }
          });
          y = doc.lastAutoTable.finalY;
        });
      }
      if(itemGroups.size===0){ drawQuoteLetterhead(doc,W,"DATA SHEET",quoteExportRef,customer); doc.setFontSize(10); doc.text("No datasheet masters found for any item in this quote.",12,40); }
      numberQuotePages(doc,W);
      doc.save(quoteExportRef.replace(/\s+/g,"_")+"_Datasheets.pdf");
    } finally { setExportingQuote(""); }
  };

  const buildQuoteSummary = (estimatesRows, linesRows)=>{
    const orderQtyBySl = new Map(estimatesRows.map(e=>[e.item_sl_no, e.order_qty||1]));
    const map = new Map();
    linesRows.forEach(l=>{
      const key = (l.material_spec||"(no spec)")+"|||"+(l.grade||"(no grade)");
      const qtyByOrder = (Number(l.qty_required)||0)*(orderQtyBySl.get(l.item_sl_no)||1);
      const rate = Number(l.rate)||0;
      const sf = Number(l.sf)||3.1;
      if(!map.has(key)) map.set(key,{spec:l.material_spec||"(no spec)",grade:l.grade||"",uom:l.uom||"",rate,totalQty:0,totalCost:0,totalSales:0,slNos:new Set()});
      const g = map.get(key);
      g.totalQty += qtyByOrder; g.totalCost += qtyByOrder*rate; g.totalSales += qtyByOrder*rate*sf;
      g.slNos.add(l.item_sl_no);
    });
    return Array.from(map.values()).map(g=>({...g, slNoList: Array.from(g.slNos).sort((a,b)=>a-b).join(", ")}))
      .sort((a,b)=>a.spec.localeCompare(b.spec)||a.grade.localeCompare(b.grade));
  };

  const exportQuoteSummaryExcel = async()=>{

    setExportingQuote("sum-xlsx");
    try {
      const {estimatesRows, linesRows} = await fetchQuoteBundle(quoteExportRef);

      const headers = ["Material spec","Grade","Total qty","UOM","Rate","Total cost","Total sales price","Sl Nos"];
      const rows = summary.map(g=>[g.spec,g.grade,g.totalQty%1===0?g.totalQty:Number(g.totalQty.toFixed(3)),g.uom,g.rate,Number(g.totalCost.toFixed(2)),Number(g.totalSales.toFixed(2)),g.slNoList]);
      const totalCost = summary.reduce((s,g)=>s+g.totalCost,0);
      const totalSales = summary.reduce((s,g)=>s+g.totalSales,0);
      rows.push(["","","","","TOTAL",Number(totalCost.toFixed(2)),Number(totalSales.toFixed(2)),""]);
      const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);

      const totalCost = summary.reduce((s,g)=>s+g.totalCost,0);
      const totalSales = summary.reduce((s,g)=>s+g.totalSales,0);
      doc.autoTable({

        foot:[["","","","","TOTAL",fmt(totalCost),fmt(totalSales),""]],
        theme:"grid",
        headStyles:{fillColor:neutral,textColor:dark,fontStyle:"bold",fontSize:8,lineColor:[216,212,197],lineWidth:0.2},
        footStyles:{fillColor:neutral,textColor:dark,fontStyle:"bold",fontSize:8},
        bodyStyles:{fontSize:7.5,textColor:dark},

      });

  return h(React.Fragment,null,
    h("div",{style:{padding:"20px 24px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}},
        h("h2",{style:{margin:0,fontSize:18,fontWeight:700}},"Quotes"),
        h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
          h("select",{value:refFilter,onChange:e=>{

          },style:{...inputStyle,width:190}},

            Array.from(new Set(refs.map(r=>r.reference_number))).map(rn=>h("option",{key:rn,value:rn},rn))
          ),
          h("select",{value:slNoFilter,onChange:e=>{
            const val=e.target.value; setSlNoFilter(val);
            if(refFilter && val){ const match=refs.find(r=>r.reference_number===refFilter&&String(r.item_sl_no)===String(val)); if(match) openEstimate(match); }
          },style:{...inputStyle,width:110}},
            h("option",{value:""},"Sl No"),

/* ---- CHANGE PASSWORD ---- */
function ChangePassword({ user }) {
  const [current,setCurrent]=useState(""); const [next,setNext]=useState(""); const [confirm,setConfirm]=useState("");
  const [msg,setMsg]=useState(""); const [ok,setOk]=useState(false);
  const save=async()=>{
    setMsg(""); setOk(false);
    if(!current||!next||!confirm){setMsg("All fields required.");return;}
    if(next!==confirm){setMsg("New passwords do not match.");return;}
    if(next.length<6){setMsg("Password must be at least 6 characters.");return;}
    const{data}=await sb.from("app_users").select("password").eq("username",user.username).single();
    if(!data||data.password!==current){setMsg("Current password is incorrect.");return;}
    const{error:err}=await sb.from("app_users").update({password:next}).eq("username",user.username);
    if(err){setMsg("Failed: "+err.message);return;}
    await logAudit("UPDATE","app_users",user.username,"Password changed",user.username,null,null);
    setMsg("Password changed successfully."); setOk(true); setCurrent(""); setNext(""); setConfirm("");
  };
  return h("div",{style:{padding:"20px 24px",maxWidth:400}},
    h("h2",{style:{margin:"0 0 18px",fontSize:18,fontWeight:700}},"Change password"),
    h("label",{style:{display:"block",fontSize:12,color:colors.muted,marginBottom:4}},"Current password"),
    h("input",{type:"password",value:current,onChange:e=>setCurrent(e.target.value),style:{...inputStyle,marginBottom:14}}),
    h("label",{style:{display:"block",fontSize:12,color:colors.muted,marginBottom:4}},"New password"),
    h("input",{type:"password",value:next,onChange:e=>setNext(e.target.value),style:{...inputStyle,marginBottom:14}}),
    h("label",{style:{display:"block",fontSize:12,color:colors.muted,marginBottom:4}},"Confirm new password"),
    h("input",{type:"password",value:confirm,onChange:e=>setConfirm(e.target.value),style:{...inputStyle,marginBottom:14}}),
    msg&&h("div",{style:{fontSize:12,color:ok?"#2d7a4f":colors.danger,marginBottom:10}},msg),
    h("button",{onClick:save,style:btnPrimary},"Change password")
  );
}

  const [users,setUsers]=useState([]); const [selUser,setSelUser]=useState("");

  const [saving,setSaving]=useState(false); const [msg,setMsg]=useState("");

  const loadPerms=async(username)=>{
    setSelUser(username); setLoading(true); setMsg("");

/* ---- ASME FORMULAS ---- */
// All computations in SI (mm, MPa) internally; convert inputs/outputs per selected unit

function calcCylindrical(P, R, S, E, CA, code, pressType) {
  // P=design pressure MPa, R=inside radius mm, S=allowable stress MPa, E=joint efficiency
  // CA=corrosion allowance mm, returns required thickness mm and MAWP
  if(pressType === "internal") {
    let t_req, MAWP;
    if(code === "D1") {
      // UG-27(c)(1): t = PR/(SE - 0.6P)
      t_req = (P * R) / (S * E - 0.6 * P);
      const t_min = t_req + CA;
      // MAWP for given t (t_nom assumed = t_min)
      MAWP = (S * E * t_req) / (R + 0.6 * t_req);
      return { t_req: t_req.toFixed(2), t_min: t_min.toFixed(2), MAWP: MAWP.toFixed(3), formula: "t = PR / (SE − 0.6P)" };
    } else {
      // Div 2 — 4.3.3: t = R(exp(P/SE) - 1)
      t_req = R * (Math.exp(P / (S * E)) - 1);
      const t_min = t_req + CA;
      MAWP = S * E * Math.log(1 + t_req / R);
      return { t_req: t_req.toFixed(2), t_min: t_min.toFixed(2), MAWP: MAWP.toFixed(3), formula: "t = R(e^(P/SE) − 1)" };
    }
  } else {
    // External pressure — ASME UG-28 requires Do/t and L/Do charts
    // Simplified: use elastic buckling approximation for estimate
    const Do = 2 * R; // approximate Do ≈ 2R
    // Critical pressure formula (simplified Windenburg-Trilling):
    // t_est = Do * (P / (2*S*E))  — simplified, user must verify with charts
    const t_est = Do * (P / (2 * S * E));
    const t_min = t_est + CA;
    return { t_req: t_est.toFixed(2), t_min: t_min.toFixed(2), MAWP: "—", formula: "t = Do·P/(2SE) — verify with UG-28 charts", warning: "⚠ External pressure requires UG-28 geometric charts for final design. This is an estimate only." };
  }
}

function calcConical(P, D, alpha_deg, S, E, CA, code, pressType) {
  // D=large end ID mm, alpha=half apex angle deg
  const alpha = alpha_deg * Math.PI / 180;
  const cos_a = Math.cos(alpha);
  if(pressType === "internal") {
    let t_req;
    if(code === "D1") {
      // UG-32(g): t = PD / (2cos(α)(SE - 0.6P))
      t_req = (P * D) / (2 * cos_a * (S * E - 0.6 * P));
    } else {
      // Div 2 — 4.3.4
      t_req = (P * D) / (2 * cos_a * (S * E - 0.6 * P));
    }
    const t_min = t_req + CA;
    const MAWP = (2 * S * E * t_req * cos_a) / (D + 1.2 * t_req * cos_a);
    return { t_req: t_req.toFixed(2), t_min: t_min.toFixed(2), MAWP: MAWP.toFixed(3), formula: "t = PD / (2cosα(SE − 0.6P))" };
  } else {
    const t_est = (P * D) / (2 * cos_a * 2 * S * E);
    return { t_req: t_est.toFixed(2), t_min: (t_est+CA).toFixed(2), MAWP:"—", formula:"Estimate only — verify with UG-33 charts", warning:"⚠ External pressure requires UG-33 design charts." };
  }
}

function calcHemisphericalHead(P, R, S, E, CA, code, pressType) {
  if(pressType === "internal") {
    let t_req;
    if(code === "D1") {
      // UG-32(f): t = PL / (2SE - 0.2P) where L=R for hemi
      t_req = (P * R) / (2 * S * E - 0.2 * P);
    } else {
      t_req = (P * R) / (2 * S * E - 0.2 * P);
    }
    const t_min = t_req + CA;
    const MAWP = (2 * S * E * t_req) / (R + 0.2 * t_req);
    return { t_req: t_req.toFixed(2), t_min: t_min.toFixed(2), MAWP: MAWP.toFixed(3), formula: "t = PR / (2SE − 0.2P)" };
  } else {
    const t_est = (P * R) / (2 * S * E);
    return { t_req: t_est.toFixed(2), t_min: (t_est+CA).toFixed(2), MAWP:"—", formula:"Estimate only — verify with UG-33", warning:"⚠ External pressure: verify with UG-33." };
  }
}

function calcEllipsoidalHead(P, D, S, E, CA, code, pressType) {
  // Standard 2:1 ellipsoidal head: K=1.0 for 2:1 ratio
  if(pressType === "internal") {
    let t_req;
    if(code === "D1") {
      // UG-32(d): t = PD / (2SE - 0.2P)
      t_req = (P * D) / (2 * S * E - 0.2 * P);
    } else {
      t_req = (P * D) / (2 * S * E - 0.2 * P);
    }
    const t_min = t_req + CA;
    const MAWP = (2 * S * E * t_req) / (D + 0.2 * t_req);
    return { t_req: t_req.toFixed(2), t_min: t_min.toFixed(2), MAWP: MAWP.toFixed(3), formula: "t = PD / (2SE − 0.2P) [2:1 ratio, K=1.0]" };
  } else {
    const t_est = (P * D) / (2 * 2 * S * E);
    return { t_req: t_est.toFixed(2), t_min: (t_est+CA).toFixed(2), MAWP:"—", formula:"Estimate only", warning:"⚠ External pressure: verify with UG-33." };
  }
}

function calcTorisphericalHead(P, D, S, E, CA, code, pressType) {
  // Standard ASME F&D: L=D, r=0.06D
  const L = D; const r = 0.06 * D;
  const M = (1/4) * (3 + Math.sqrt(L / r));  // stress intensification factor
  if(pressType === "internal") {
    let t_req;
    if(code === "D1") {
      // UG-32(e): t = 0.885PL / (SE - 0.1P)
      t_req = (0.885 * P * L) / (S * E - 0.1 * P);
    } else {
      t_req = (0.885 * P * L) / (S * E - 0.1 * P);
    }
    const t_min = t_req + CA;
    const MAWP = (S * E * t_req) / (0.885 * L + 0.1 * t_req);
    return { t_req: t_req.toFixed(2), t_min: t_min.toFixed(2), MAWP: MAWP.toFixed(3), M: M.toFixed(3), formula: "t = 0.885PL / (SE − 0.1P) [ASME F&D: L=D, r=0.06D]" };
  } else {
    const t_est = (0.885 * P * L) / (S * E);
    return { t_req: t_est.toFixed(2), t_min: (t_est+CA).toFixed(2), MAWP:"—", formula:"Estimate only", warning:"⚠ External pressure: verify with UG-33." };
  }
}

function calcFlatHead(P, D, S, E, CA, C, code) {
  // UG-34: t = d * sqrt(C*P/(S*E))
  // C = attachment factor (0.10–0.33 typically; 0.13 for bolted with full-face gasket, 0.20 for welded)
  const t_req = D * Math.sqrt((C * P) / (S * E));
  const t_min = t_req + CA;
  const MAWP = S * E * Math.pow(t_req / D, 2) / C;
  return { t_req: t_req.toFixed(2), t_min: t_min.toFixed(2), MAWP: MAWP.toFixed(3), formula: "t = d√(CP/SE), C="+C };
}

function calcSliponFlange(P, Bo, Bi, S, E, CA) {
  // Simplified hub stress check for SORF: treat as flat annular plate
  // ASME B16.5 does not calculate thickness from first principles in this way,
  // but we use a simplified pressure area approach:
  // t = 0.5*(Bo-Bi)/2 * sqrt(3P/S) — conservative estimate
  const r_mean = (Bo + Bi) / 4;
  const t_req = r_mean * Math.sqrt(3 * P / S);
  const t_min = t_req + CA;
  const MAWP = S * Math.pow(t_req / r_mean, 2) / 3;
  return { t_req: t_req.toFixed(2), t_min: t_min.toFixed(2), MAWP: MAWP.toFixed(3), formula: "t = r_mean·√(3P/S) — simplified; verify with ASME B16.5 or Appendix 2" };
}

function calcBlindFlange(P, D, S, E, CA) {
  // ASME Appendix 2 / UG-34: blind flange as flat plate
  // t = d * sqrt(0.3*P / (S*E)) for bolted, C=0.3 typical
  const C = 0.3;
  const t_req = D * Math.sqrt((C * P) / (S * E));
  const t_min = t_req + CA;
  const MAWP = S * E * Math.pow(t_req / D, 2) / C;
  return { t_req: t_req.toFixed(2), t_min: t_min.toFixed(2), MAWP: MAWP.toFixed(3), formula: "t = d√(0.3P/SE) — ASME App 2/UG-34 bolted blind" };
}

/* ---- CALCS UI ---- */
function EngineeringCalcs({ user }) {
  const [calcType,setCalcType]=useState("cylindrical");
  const [code,setCode]=useState("D1");
  const [pressType,setPressType]=useState("internal");
  const [units,setUnits]=useState("metric"); // metric=mm/MPa, imperial=in/psi
  const dimUnit = units==="metric"?"mm":"in";
  const presUnit = units==="metric"?"MPa":"psi";
  const [stressRows,setStressRows]=useState([]);
  const [inputs,setInputs]=useState({E:1.0,CA:0,C:0.2});
  const [result,setResult]=useState(null);
  const [saving,setSaving]=useState(false);
  const [saveMsg,setSaveMsg]=useState("");

  useEffect(()=>{ sb.from("allowable_stress").select("material_spec,grade,s_20,s_div2_20").order("material_spec").then(({data})=>setStressRows(data||[])); },[]);

  const set=(f,v)=>setInputs(i=>({...i,[f]:v}));

  const getS=()=>{
    const row=stressRows.find(r=>r.material_spec===inputs.material_spec&&r.grade===inputs.grade);
    if(!row) return Number(inputs.S)||0;
    return code==="D1"?(row.s_20||0):(row.s_div2_20||0);
  };

  const calculate=()=>{
    const P_si=toMPa(Number(inputs.P)||0, presUnit);
    const S_si=toMPa(getS(), presUnit);
    const E=Number(inputs.E)||1.0;
    const CA_si=toMM(Number(inputs.CA)||0, dimUnit);
    let res;
    if(calcType==="cylindrical"){
      const R_si=toMM(Number(inputs.R)||0,dimUnit);
      res=calcCylindrical(P_si,R_si,S_si,E,CA_si,code,pressType);
    } else if(calcType==="conical"){
      const D_si=toMM(Number(inputs.D)||0,dimUnit);
      res=calcConical(P_si,D_si,Number(inputs.alpha)||0,S_si,E,CA_si,code,pressType);
    } else if(calcType==="hemispherical"){
      const R_si=toMM(Number(inputs.R)||0,dimUnit);
      res=calcHemisphericalHead(P_si,R_si,S_si,E,CA_si,code,pressType);
    } else if(calcType==="ellipsoidal"){
      const D_si=toMM(Number(inputs.D)||0,dimUnit);
      res=calcEllipsoidalHead(P_si,D_si,S_si,E,CA_si,code,pressType);
    } else if(calcType==="torispherical"){
      const D_si=toMM(Number(inputs.D)||0,dimUnit);
      res=calcTorisphericalHead(P_si,D_si,S_si,E,CA_si,code,pressType);
    } else if(calcType==="flat_head"){
      const D_si=toMM(Number(inputs.D)||0,dimUnit);
      res=calcFlatHead(P_si,D_si,S_si,E,CA_si,Number(inputs.C)||0.2,code);
    } else if(calcType==="slipon_flange"){
      const Bo_si=toMM(Number(inputs.Bo)||0,dimUnit);
      const Bi_si=toMM(Number(inputs.Bi)||0,dimUnit);
      res=calcSliponFlange(P_si,Bo_si,Bi_si,S_si,E,CA_si);
    } else if(calcType==="blind_flange"){
      const D_si=toMM(Number(inputs.D)||0,dimUnit);
      res=calcBlindFlange(P_si,D_si,S_si,E,CA_si);
    }
    if(res){
      // Convert results back to selected units
      res.t_req_disp=fromMM(Number(res.t_req),dimUnit).toFixed(2);
      res.t_min_disp=fromMM(Number(res.t_min),dimUnit).toFixed(2);
      if(res.MAWP!=="—") res.MAWP_disp=fromMPa(Number(res.MAWP),presUnit).toFixed(3);
      else res.MAWP_disp="—";
      setResult(res);
    }
  };

  const saveCalc=async()=>{
    if(!result) return; setSaving(true); setSaveMsg("");
    try {
      await sb.from("calc_history").insert({
        calc_type:calcType, code:"ASME_VIII_"+code, pressure_type:pressType,
        inputs:{...inputs,units}, results:result, performed_by:user.username
      });
      setSaveMsg("Calculation saved to history.");
    } catch(e){setSaveMsg("Save failed: "+e.message);} finally{setSaving(false);}
  };

  const exportPDFCalc=()=>{
    if(!result) return;
    const calcLabels={cylindrical:"Cylindrical Shell",conical:"Conical Shell",hemispherical:"Hemispherical Head",ellipsoidal:"Ellipsoidal (2:1) Head",torispherical:"Torispherical (F&D) Head",flat_head:"Flat Head",slipon_flange:"Slip-On Flange",blind_flange:"Blind Flange"};
    const rows=[
      ["Code","ASME VIII "+code],
      ["Pressure type",pressType==="internal"?"Internal Pressure":"External Pressure"],
      ["Component",calcLabels[calcType]||calcType],
      ["Units",units==="metric"?"Metric (mm, MPa)":"Imperial (in, psi)"],
      ["",""],
      ["--- INPUTS ---",""],
      ["Design pressure ("+presUnit+")",inputs.P||""],
      ["Allowable stress S ("+presUnit+")",getS()||inputs.S||""],
      ["Joint efficiency E",inputs.E||1.0],
      ["Corrosion allowance ("+dimUnit+")",inputs.CA||0],
    ];
    if(inputs.R) rows.push(["Inside radius ("+dimUnit+")",inputs.R]);
    if(inputs.D) rows.push(["Inside diameter ("+dimUnit+")",inputs.D]);
    if(inputs.alpha) rows.push(["Half apex angle (°)",inputs.alpha]);
    if(inputs.C) rows.push(["Attachment factor C",inputs.C]);
    if(inputs.Bo) rows.push(["Flange OD ("+dimUnit+")",inputs.Bo]);
    if(inputs.Bi) rows.push(["Flange bore ("+dimUnit+")",inputs.Bi]);
    rows.push(["",""],["--- RESULTS ---",""],
      ["Formula",result.formula||""],
      ["Required thickness t_req ("+dimUnit+")",result.t_req_disp],
      ["Min thickness incl. CA ("+dimUnit+")",result.t_min_disp],
      ["MAWP ("+presUnit+")",result.MAWP_disp||"—"],
    );
    if(result.warning) rows.push(["⚠ Note",result.warning]);
    generatePDF({
      title:calcLabels[calcType]+" Calculation",
      refNumber:"ASME VIII "+code,
      description:inputs.material_spec&&inputs.grade?inputs.material_spec+" — "+inputs.grade:"",
      createdBy:user.username, createdAt:Date.now(),
      headers:["Parameter","Value"],
      rows, footerRows:[], filename:"calc_"+calcType+"_"+Date.now()+".pdf"
    });
  };

  const calcTypes=[
    {key:"cylindrical",label:"Cylindrical Shell"},
    {key:"conical",label:"Conical Shell"},
    {key:"hemispherical",label:"Hemispherical Head"},
    {key:"ellipsoidal",label:"Ellipsoidal Head (2:1)"},
    {key:"torispherical",label:"Torispherical Head (F&D)"},
    {key:"flat_head",label:"Flat Head"},
    {key:"slipon_flange",label:"Slip-On Flange"},
    {key:"blind_flange",label:"Blind Flange"},
  ];

  const specOptions=Array.from(new Set(stressRows.map(r=>r.material_spec).filter(Boolean))).sort();
  const gradeOptions=stressRows.filter(r=>r.material_spec===inputs.material_spec).map(r=>r.grade);

  return h("div",{style:{padding:"20px 24px"}},
    h("h2",{style:{margin:"0 0 16px",fontSize:18,fontWeight:700}},"Engineering Calculations — ASME VIII"),

    h("div",{style:{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-start"}},

      // LEFT: inputs
      h("div",{style:{width:300,flexShrink:0}},
        h(CalcSection,{title:"Code & Configuration"},
          h("div",{style:{marginBottom:10}},
            h("label",{style:{display:"block",fontSize:11,color:colors.muted,marginBottom:4}},"Component type"),
            h("select",{value:calcType,onChange:e=>{setCalcType(e.target.value);setResult(null);},style:inputStyle},
              calcTypes.map(c=>h("option",{key:c.key,value:c.key},c.label))
            )
          ),
          h("div",{style:{display:"flex",gap:8,marginBottom:10}},
            h("div",{style:{flex:1}},h("label",{style:{display:"block",fontSize:11,color:colors.muted,marginBottom:4}},"Code division"),
              h("select",{value:code,onChange:e=>setCode(e.target.value),style:inputStyle},h("option",{value:"D1"},"Div 1"),h("option",{value:"D2"},"Div 2"))
            ),
            h("div",{style:{flex:1}},h("label",{style:{display:"block",fontSize:11,color:colors.muted,marginBottom:4}},"Units"),
              h("select",{value:units,onChange:e=>setUnits(e.target.value),style:inputStyle},h("option",{value:"metric"},"mm / MPa"),h("option",{value:"imperial"},"in / psi"))
            )
          ),
          h("div",{style:{marginBottom:6}},
            h("label",{style:{display:"block",fontSize:11,color:colors.muted,marginBottom:4}},"Pressure type"),
            h("div",{style:{display:"flex",gap:8}},
              ["internal","external"].map(pt=>h("button",{key:pt,onClick:()=>setPressType(pt),style:{...btnSecondary,flex:1,background:pressType===pt?colors.dark:"#fff",color:pressType===pt?"#fff":colors.text}},pt.charAt(0).toUpperCase()+pt.slice(1)))
            )
          )
        ),

        h(CalcSection,{title:"Material & Stress"},
          h("div",{style:{marginBottom:10}},
            h("label",{style:{display:"block",fontSize:11,color:colors.muted,marginBottom:4}},"Material spec (from your master)"),
            h("select",{value:inputs.material_spec||"",onChange:e=>set("material_spec",e.target.value),style:inputStyle},
              h("option",{value:""},"Select or enter S manually below…"),
              specOptions.map(s=>h("option",{key:s,value:s},s))
            )
          ),
          inputs.material_spec&&h("div",{style:{marginBottom:10}},
            h("label",{style:{display:"block",fontSize:11,color:colors.muted,marginBottom:4}},"Grade"),
            h("select",{value:inputs.grade||"",onChange:e=>set("grade",e.target.value),style:inputStyle},
              h("option",{value:""},"Select grade…"),
              gradeOptions.map(g=>h("option",{key:g,value:g},g))
            )
          ),
          h(CalcInput,{label:"Allowable stress S",value:inputs.material_spec&&inputs.grade?getS():(inputs.S||""),onChange:v=>set("S",v),unit:presUnit,note:inputs.material_spec&&inputs.grade?"auto-filled from master":"manual entry",readonly:!!(inputs.material_spec&&inputs.grade)}),
          h(CalcInput,{label:"Joint efficiency E",value:inputs.E||1.0,onChange:v=>set("E",v),note:"1.0=fully radiographed, 0.85=spot, 0.70=none"})
        ),

        h(CalcSection,{title:"Design Parameters"},
          h(CalcInput,{label:"Design pressure P",value:inputs.P||"",onChange:v=>set("P",v),unit:presUnit}),
          (["cylindrical","hemispherical"].includes(calcType))&&h(CalcInput,{label:"Inside radius R",value:inputs.R||"",onChange:v=>set("R",v),unit:dimUnit}),
          (["conical","ellipsoidal","torispherical","flat_head","blind_flange"].includes(calcType))&&h(CalcInput,{label:"Inside diameter D",value:inputs.D||"",onChange:v=>set("D",v),unit:dimUnit}),
          calcType==="conical"&&h(CalcInput,{label:"Half apex angle α",value:inputs.alpha||"",onChange:v=>set("alpha",v),unit:"degrees",note:"from vessel axis"}),
          calcType==="flat_head"&&h(CalcInput,{label:"Attachment factor C",value:inputs.C||0.2,onChange:v=>set("C",v),note:"0.13 bolted FF, 0.17 bolted RJ, 0.20 welded, 0.33 corner weld"}),
          calcType==="slipon_flange"&&h(React.Fragment,null,
            h(CalcInput,{label:"Flange OD (Bo)",value:inputs.Bo||"",onChange:v=>set("Bo",v),unit:dimUnit}),
            h(CalcInput,{label:"Flange bore (Bi)",value:inputs.Bi||"",onChange:v=>set("Bi",v),unit:dimUnit})
          ),
          h(CalcInput,{label:"Corrosion allowance CA",value:inputs.CA||0,onChange:v=>set("CA",v),unit:dimUnit})
        ),

        h("button",{onClick:calculate,style:{...btnPrimary,width:"100%",padding:"12px 0",fontSize:14}},"Calculate")
      ),

      // RIGHT: results
      h("div",{style:{flex:1,minWidth:280}},
        !result?h("div",{style:{color:colors.mutedLight,fontSize:14,marginTop:40,textAlign:"center"}},"Fill in parameters and click Calculate."):
        h(React.Fragment,null,
          h(CalcSection,{title:"Results — "+calcTypes.find(c=>c.key===calcType)?.label},
            h(CalcResult,{label:"Formula used",value:result.formula||""}),
            h(CalcResult,{label:"Required thickness t_req ("+dimUnit+")",value:result.t_req_disp,unit:"",highlight:false}),
            h(CalcResult,{label:"Min thickness incl. CA ("+dimUnit+")",value:result.t_min_disp,unit:"",highlight:true}),
            h(CalcResult,{label:"MAWP ("+presUnit+")",value:result.MAWP_disp||"—",unit:""}),
            result.M&&h(CalcResult,{label:"Stress intensification M",value:result.M,unit:""}),
            result.warning&&h("div",{style:{marginTop:10,padding:"10px 12px",background:"#fef9e7",border:"1px solid #f0d060",borderRadius:6,fontSize:12,color:"#8b6900"}},result.warning)
          ),
          h(CalcSection,{title:"Code Reference"},
            h("div",{style:{fontSize:12.5,color:colors.muted,lineHeight:1.7}},
              code==="D1"?h(React.Fragment,null,
                h("div",null,"📘 ASME VIII Division 1"),
                calcType==="cylindrical"&&h("div",null,"UG-27(c)(1) — Cylindrical shells under internal pressure"),
                calcType==="conical"&&h("div",null,"UG-32(g) — Conical sections"),
                calcType==="hemispherical"&&h("div",null,"UG-32(f) — Hemispherical heads"),
                calcType==="ellipsoidal"&&h("div",null,"UG-32(d) — Ellipsoidal heads (2:1 ratio)"),
                calcType==="torispherical"&&h("div",null,"UG-32(e) — Torispherical (ASME F&D) heads"),
                calcType==="flat_head"&&h("div",null,"UG-34 — Unstayed flat heads and covers"),
                calcType==="slipon_flange"&&h("div",null,"Appendix 2 — Rules for Bolted Flange Connections"),
                calcType==="blind_flange"&&h("div",null,"UG-34 / Appendix 2 — Blind flanges"),
                pressType==="external"&&h("div",null,"UG-28 — Vessels under external pressure (charts required)")
              ):h(React.Fragment,null,
                h("div",null,"📗 ASME VIII Division 2"),
                calcType==="cylindrical"&&h("div",null,"4.3.3 — Design of shells under internal pressure"),
                calcType==="conical"&&h("div",null,"4.3.4 — Design of conical sections"),
                (["hemispherical","ellipsoidal","torispherical"].includes(calcType))&&h("div",null,"4.3.6 — Design of formed heads"),
                calcType==="flat_head"&&h("div",null,"4.6 — Design of flat heads"),
                (["slipon_flange","blind_flange"].includes(calcType))&&h("div",null,"4.16 — Design of flanges")
              )
            )
          ),
          h("div",{style:{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}},
            h("button",{onClick:saveCalc,disabled:saving,style:btnSecondary},saving?"Saving…":"Save to history"),
            h("button",{onClick:exportPDFCalc,style:btnPrimary},"Export PDF")
          ),
          saveMsg&&h("div",{style:{marginTop:8,fontSize:12,color:saveMsg.startsWith("Save failed")?colors.danger:"#2d7a4f"}},saveMsg)
        )
      )
    )
  );
}

function CalcHistoryViewer({ user }) {
  const [rows,setRows]=useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{
    sb.from("calc_history").select("*").eq("performed_by",user.username).order("performed_at",{ascending:false}).limit(50)
      .then(({data})=>{ setRows(data||[]); setLoading(false); });
  },[user.username]);
  return h("div",{style:{padding:"20px 24px"}},
    h("h2",{style:{margin:"0 0 14px",fontSize:18,fontWeight:700}},"Calculation history"),
    loading?h("div",{style:{color:colors.mutedLight}},"Loading…"):
    rows.length===0?h("div",{style:{color:colors.mutedLight,fontSize:13}},"No saved calculations yet."):
    h("div",{style:{border:"1px solid "+colors.border,borderRadius:6,overflowX:"auto"}},
      h("table",{style:{fontSize:12.5}},
        h("thead",null,h("tr",{style:{background:"#faf9f4",textAlign:"left"}},
          ["Component","Code","Pressure","Material","t_req","t_min","MAWP","Date"].map(c=>h("th",{key:c,style:{padding:"8px 10px"}},c))
        )),
        h("tbody",null,rows.map(r=>h("tr",{key:r.id,style:{borderBottom:"1px solid #eceae0"}},
          h("td",{style:{padding:"8px 10px"}},r.calc_type),
          h("td",{style:{padding:"8px 10px"}},r.code),
          h("td",{style:{padding:"8px 10px"}},r.pressure_type),
          h("td",{style:{padding:"8px 10px",fontSize:11}},r.inputs?.material_spec||"manual"),
          h("td",{style:{padding:"8px 10px",textAlign:"right"}},r.results?.t_req_disp||r.results?.t_req),
          h("td",{style:{padding:"8px 10px",textAlign:"right",fontWeight:700}},r.results?.t_min_disp||r.results?.t_min),
          h("td",{style:{padding:"8px 10px",textAlign:"right"}},r.results?.MAWP_disp||r.results?.MAWP),
          h("td",{style:{padding:"8px 10px",fontSize:11,color:colors.muted}},new Date(r.performed_at).toLocaleDateString("en-IN"))
        )))
      )
    )
  );
}


function App() {
  const [user,setUser]=useState(null); const [tab,setTab]=useState("estimator");
  const [masterData,setMasterData]=useState({models:[],gradesBySpec:new Map(),rateBySpecGrade:new Map(),allSpecs:[],loadingMaster:true});
  const [quoteToOpen,setQuoteToOpen]=useState(null); // {reference_number,item_sl_no} bridge from Estimator's save popup to Quotes

  useEffect(()=>{ if(user) loadMasterData(setMasterData); },[user]);
  const refresh=useCallback(()=>{ setMasterData(m=>({...m,loadingMaster:true})); loadMasterData(setMasterData); },[]);

  if(!user) return h(LoginScreen,{onLogin:setUser});

  return h("div",{style:{minHeight:"100vh"}},
    h(TopBar,{user,onLogout:()=>{setUser(null);setMasterData({models:[],gradesBySpec:new Map(),rateBySpecGrade:new Map(),allSpecs:[],loadingMaster:true});}}),
    h(MenuTabs,{user,active:tab,onChange:setTab}),
    h("div",{style:{display:tab==="estimator"?"block":"none"}},h(Estimator,{user,masterData,onRefresh:refresh,onOpenQuote:(ref,slNo)=>{setQuoteToOpen({reference_number:ref,item_sl_no:slNo});setTab("saved");}})),
    tab==="saved"?h(SavedEstimates,{user,openTarget:quoteToOpen,onConsumedTarget:()=>setQuoteToOpen(null)}):
    tab==="calcs"?h("div",null,h(EngineeringCalcs,{user}),h(CalcHistoryViewer,{user})):
    tab==="bom_form"?h(BomEntryForm,{onGoToTab:setTab}):
    tab==="allowable_stress"?h(AllowableStressEditor,null):
    tab==="datasheet_master"?h(DatasheetMasterEditor,{onGoToTab:setTab}):
    tab==="users"?h(UsersEditor,{user}):
    tab==="permissions"?h(PermissionsEditor,null):
    tab==="login_history"?h(LoginHistoryViewer,null):
    tab==="audit_log"?h(AuditLogViewer,null):
    tab==="change_password"?h(ChangePassword,{user}):
    (tab!=="estimator"?h(MasterEditor,{tableKey:tab,key:tab,user}):null)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
