/* ---- DATASHEET MASTER TEMPLATE ENGINE ----
   Templates are data, not code: they live in the datasheet_master_fields table
   (managed from the "Datasheet Master" admin screen — drag & drop an Excel file,
   or add rows by hand). Add a new item type there; no code changes needed here.
   Field types: "auto_model" (from the estimate), "bom" (auto-matched to a BOM
   line by keyword on the component name), "dropdown" (options from the master),
   "text" (free entry). A section with section_is_bom=true is auto-filled from
   estimate_lines where show_in_moc = true; everything else is filled via the
   popup form. */
function normalizeItemName(s){ return (s||"").replace(/\s+/g," ").trim().toLowerCase(); }

async function loadDatasheetMaster(item){
  if(!item) return null;
  const target = normalizeItemName(item);
  const { data, error } = await sb.from("datasheet_master_fields").select("*");
  if(error || !data) return null;
  const rows = data.filter(r=>normalizeItemName(r.item)===target).sort((a,b)=>(a.field_order||0)-(b.field_order||0));
  if(rows.length===0) return null;
  const secMap = new Map();
  rows.forEach(row=>{
    if(!secMap.has(row.section_no)) secMap.set(row.section_no, { no:row.section_no, title:row.section_title, bomSection:row.section_is_bom, fields:[] });
    secMap.get(row.section_no).fields.push({
      key: row.field_key, label: row.field_label, type: row.field_type,
      options: row.options ? row.options.split("|") : null,
      match: row.bom_match ? row.bom_match.split(",").map(s=>s.trim()).filter(Boolean) : null,
      default: row.default_value || null,
    });
  });
  const sections = Array.from(secMap.values()).sort((a,b)=>a.no-b.no);
  return { item, docTitle: "Technical Data Sheet — "+item, sections };
}
function matchDatasheetBomLine(field, lines, used){
  const idx = lines.findIndex((l,i)=>!used.has(i) && (field.match||[]).some(kw=>(l.component||"").toLowerCase().includes(kw)));
  if(idx===-1) return null;
  used.add(idx);
  return lines[idx];
}
function bomFieldDisplay(m){ return m ? (m.material_spec||"")+((m.grade&&m.grade!=="-")?" / "+m.grade:"") : ""; }

function sanitizeSheetName(s){
  return ((s||"Sheet").replace(/[:\\\/\?\*\[\]]/g,"").trim()||"Sheet").slice(0,31);
}
function r2(n){ const x = Number(n); return isNaN(x) ? 0 : Math.round(x*100)/100; }
// Applies a 2-decimal, thousands-separated number format to every numeric cell
// from fromRow (1-indexed) onward. Note: the free/community build of SheetJS
// used here (xlsx.full.min.js) can set number formats but cannot write font
// styles (bold, color) into .xlsx — that requires the Pro build. So Excel
// output below uses spacing/structure for readability instead of bold text;
// PDF output uses real bold via jsPDF, which has no such limitation.
function applyNumberFormat(ws, fromRow){
  if(!ws['!ref']) return;
  const range = XLSX.utils.decode_range(ws['!ref']);
  for(let R=fromRow-1; R<=range.e.r; R++){
    for(let C=range.s.c; C<=range.e.c; C++){
      const addr = XLSX.utils.encode_cell({r:R,c:C});
      const cell = ws[addr];
      if(cell && typeof cell.v === "number") cell.z = "#,##0.00";
    }
  }
}

// Mirrors DatasheetModal's getSectionRows, but as a standalone function so the
// quote-wide export can rebuild a datasheet's sections without mounting the modal.
// mocLines must be the ticked ("Show in MOC") lines for that one Sl No only.
function buildDatasheetSectionRows(template, fieldValues, mocLines, model){
  const values = fieldValues || {};
  const materialDataRows = (mocLines||[]).map(l=>({
    key: "moc-"+(l.reference_number||"")+"-"+l.sl_no,
    label: l.sub_assembly || l.component || "(unnamed)",
    value: l.grade || "—"
  }));
  return template.sections.map(section=>{
    const deleted = new Set((values.__deletedKeys && values.__deletedKeys[section.no]) || []);
    let base;
    if(section.bomSection){
      base = materialDataRows.map(r=>({ key:r.key, label:r.label, value:r.value }));
    } else {
      base = section.fields.map(f=>{
        let val;
        if(f.type==="auto_model") val = model||"";
        else val = values[f.key]!==undefined ? values[f.key] : (f.default||"");
        return { key:f.key, label:f.label, value:val };
      });
    }
    base = base.filter(r=>!deleted.has(r.key));
    const extra = ((values.__extraRows && values.__extraRows[section.no]) || []).map(r=>({key:r.id,label:r.label,value:r.value}));
    return { title: section.bomSection?"Material Data":section.title, rows:[...base,...extra] };
  });
}

// Turns [{slNo, sectionsRows}] instances of the SAME item into a row/column
// matrix per section: one row per field label (union across instances,
// first-seen order), one column per Sl No.
function buildItemMatrix(instances){
  const sectionOrder=[]; const seenSec=new Set();
  instances.forEach(inst=>inst.sectionsRows.forEach(sec=>{ if(!seenSec.has(sec.title)){ seenSec.add(sec.title); sectionOrder.push(sec.title); } }));
  return sectionOrder.map(title=>{
    const rowLabels=[]; const seenRow=new Set();
    instances.forEach(inst=>{
      const sec = inst.sectionsRows.find(s=>s.title===title);
      if(sec) sec.rows.forEach(r=>{ if(!seenRow.has(r.label)){ seenRow.add(r.label); rowLabels.push(r.label); } });
    });
    return {
      title,
      columns: instances.map(inst=>{
        const sec = inst.sectionsRows.find(s=>s.title===title);
        const map = new Map((sec?sec.rows:[]).map(r=>[r.label,r.value]));
        return { slNo: inst.slNo, values: rowLabels.map(lbl=> map.has(lbl)? map.get(lbl) : "") };
      }),
      rowLabels
    };
  });
}

function fmt(n) {
  if (typeof n !== "number" || isNaN(n)) return "0.00";
  return n.toLocaleString("en-IN", { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function colLabel(c) { return c.replace(/_/g," ").replace(/\b\w/g,m=>m.toUpperCase()); }

async function fetchAll(table, cols) {
  let all=[], from=0;
  while(true) {
    const { data, error } = await sb.from(table).select(cols).range(from, from+999);
    if(error) break;
    all = all.concat(data||[]);
    if(!data || data.length < 1000) break;
    from += 1000;
  }
  return all;
}

/* ---- PDF GENERATION ---- */
function generatePDF({ title, refNumber, description, createdBy, createdAt, headers, rows, footerRows, filename }) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
  const W = doc.internal.pageSize.getWidth();
  const dark = [28,31,26];
  const neutral = [244,242,234];

  const drawLetterhead = ()=>{
    // Logo on left
    try { doc.addImage(COMPANY_LOGO, "PNG", 10, 4, 40, 20); } catch(e) {}
    // Company name + address on right
    doc.setFontSize(11); doc.setTextColor(...dark); doc.setFont(undefined,"bold");
    doc.text(COMPANY_NAME, W-14, 8, { align:"right" });
    doc.setFontSize(7); doc.setFont(undefined,"normal"); doc.setTextColor(100,100,100);
    doc.text(COMPANY_ADDRESS, W-14, 13, { align:"right" });
    doc.text(COMPANY_WEBSITE+"   |   "+COMPANY_EMAIL, W-14, 17.5, { align:"right" });
    // Title
    doc.setFontSize(8.5); doc.setTextColor(...dark); doc.setFont(undefined,"bold");
    doc.text(title.toUpperCase(), W-14, 23, { align:"right" });
    // Thin divider line below header
    doc.setDrawColor(200,197,185); doc.setLineWidth(0.4);
    doc.line(10, 27, W-10, 27);
  };
  drawLetterhead();

  // Header block
  doc.setTextColor(...dark); doc.setFontSize(9); doc.setFont(undefined,"normal");
  let y = 34;
  const lbl = (label, value) => {
    doc.setFont(undefined,"bold"); doc.text(label+":", 12, y);
    doc.setFont(undefined,"normal"); doc.text(String(value||""), 42, y); y += 6;
  };
  if(refNumber) lbl("Ref No", refNumber);
  if(description) lbl("Description", description);
  if(createdBy) lbl("Prepared by", createdBy);
  lbl("Date", new Date(createdAt||Date.now()).toLocaleDateString("en-IN", {day:"2-digit",month:"short",year:"numeric"}));

  // Table
  doc.autoTable({
    startY: y + 2,
    head: [headers],
    body: rows,
    foot: footerRows || [],
    theme: "grid",
    headStyles: { fillColor: neutral, textColor: dark, fontStyle:"bold", fontSize:8, lineColor:[216,212,197], lineWidth:0.2 },
    footStyles: { fillColor: neutral, textColor: dark, fontStyle:"bold", fontSize:8 },
    bodyStyles: { fontSize:7.5, textColor: dark },
    alternateRowStyles: { fillColor:[250,249,245] },
    margin: { top:32, left:10, right:10, bottom:15 },
    didDrawPage: drawLetterhead,
    didParseCell: function(data) {
      if(data.section==="body") {
        const costIdx = headers.indexOf("Cost");
        const costVal = costIdx>=0 ? parseFloat(data.row.raw[costIdx]) : null;
        if(costVal !== null && (isNaN(costVal) || costVal === 0)) {
          data.cell.styles.fillColor = [253,236,234];
        }
      }
    }
  });

  // Page footer
  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("Page "+i+" of "+pageCount, W-12, doc.internal.pageSize.getHeight()-5, {align:"right"});
    doc.setTextColor(...dark);
    doc.text(COMPANY_NAME+" | BOM Estimator", 12, doc.internal.pageSize.getHeight()-5);
  }
  doc.save(filename||"export.pdf");
}

/* ---- LOGIN ---- */
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState(""); const [password, setPassword] = useState("");
  const [error, setError] = useState(""); const [loading, setLoading] = useState(false);
  const submit = async(e) => {
    e.preventDefault(); setError(""); setLoading(true);
    try {
      const { data, error:err } = await sb.from("app_users").select("*").eq("username",username.trim()).limit(1);
      if(err) throw err;
      const success = data&&data.length>0&&data[0].password===password;
      // Log login attempt
      await sb.from("login_history").insert({
        username: username.trim()||"unknown",
        user_agent: navigator.userAgent.substring(0,200),
        status: success?"success":"failed"
      });
      if(!success) { setError("Incorrect username or password."); setLoading(false); return; }
      onLogin({ username:data[0].username, role:data[0].role });
    } catch(e2) { setError("Cannot reach database."); } finally { setLoading(false); }
  };
  return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{width:340,maxWidth:"90vw",padding:"2rem 1.75rem",background:colors.panel,border:"1px solid "+colors.border,borderRadius:10}},
      h("div",{style:{marginBottom:22,textAlign:"center"}},
        h("img",{src:COMPANY_LOGO,alt:"Flometriq",style:{height:52,width:"auto",objectFit:"contain",marginBottom:10}}),
        h("div",{style:{fontSize:13,fontWeight:700,color:colors.text}},COMPANY_NAME),
        h("div",{style:{fontSize:11,color:colors.mutedLight,marginTop:2}},"BOM Estimator")
      ),
      h("form",{onSubmit:submit},
        h("label",{style:{display:"block",fontSize:12,color:colors.muted,marginBottom:6}},"Username"),
        h("input",{value:username,onChange:e=>setUsername(e.target.value),style:inputStyle,placeholder:"username",autoFocus:true}),
        h("label",{style:{display:"block",fontSize:12,color:colors.muted,margin:"14px 0 6px"}},"Password"),
        h("input",{type:"password",value:password,onChange:e=>setPassword(e.target.value),style:inputStyle,placeholder:"••••••••"}),
        error&&h("div",{style:{marginTop:10,fontSize:12,color:colors.danger}},error),
        h("button",{type:"submit",style:{...btnPrimary,width:"100%",marginTop:20},disabled:loading},loading?"Signing in…":"Sign in")
      )
    )
  );
}

/* ---- BOM ENTRY FORM (Access main/sub form style) ---- */
function BomEntryForm({ onGoToTab }) {
  const [allModels, setAllModels] = useState([]);
  const [modelInput, setModelInput] = useState("");
  const [subRows, setSubRows] = useState([]);
  const [loadingSub, setLoadingSub] = useState(false);
  const [masterData, setMasterData] = useState(null);
  const [loadingMasters, setLoadingMasters] = useState(true);
  const [newRowDraft, setNewRowDraft] = useState({});
  const [savingNew, setSavingNew] = useState(false);
  const [msg, setMsg] = useState("");
  const [modelNotFoundPrompt, setModelNotFoundPrompt] = useState(false);
  const modelInputRef = useRef(null);

  useEffect(()=>{
    (async()=>{
      const [bomModels, items, sizes, ciTbl, saTbl, shapes, specs, rates, uoms] = await Promise.all([
        fetchAll("bom","model"),
        fetchAll("item_tbl","item"),
        fetchAll("size_tbl","size"),
        fetchAll("component_item_tbl","component,item"),
        fetchAll("subassembly_tbl","item,component,sub_assembly"),
        fetchAll("materials_shape","shape"),
        fetchAll("material_spec","material_spec,material_shape"),
        fetchAll("material_rates","material_spec,material_grade,rate,uom"),
        fetchAll("uom_tbl","uom"),
      ]);
      setAllModels(Array.from(new Set(bomModels.map(r=>r.model).filter(Boolean))).sort());
      const gradesBySpec = new Map(), rateBySpecGrade = new Map();
      rates.forEach(r=>{
        if(!r.material_spec||!r.material_grade) return;
        if(!gradesBySpec.has(r.material_spec)) gradesBySpec.set(r.material_spec,[]);
        gradesBySpec.get(r.material_spec).push({grade:r.material_grade,rate:r.rate||0,uom:r.uom||""});
        rateBySpecGrade.set(r.material_spec+"||"+r.material_grade,{rate:r.rate||0});
      });
      setMasterData({ items, sizes, ciTbl, saTbl, shapes, specs, uoms, gradesBySpec, rateBySpecGrade });
      setLoadingMasters(false);
    })();
  },[]);

  const loadSubForm = async(model)=>{
    setLoadingSub(true); setSubRows([]);
    const { data } = await sb.from("bom").select("*").eq("model",model).order("id");
    setSubRows(data||[]); setLoadingSub(false);
    setNewRowDraft({model, sf:3.1});
  };

  const handleModelSelect = (val)=>{
    setModelInput(val); setMsg(""); setModelNotFoundPrompt(false);
    if(!val.trim()) { setSubRows([]); return; }
    if(allModels.includes(val.trim())) { loadSubForm(val.trim()); }
  };

  const handleModelBlur = ()=>{
    const val = modelInput.trim();
    if(!val) return;
    if(!allModels.includes(val)) { setModelNotFoundPrompt(true); setSubRows([]); }
  };

  const goAddModel = ()=>{ setModelNotFoundPrompt(false); onGoToTab("model_tbl"); };
  const stayPut = ()=>{ setModelNotFoundPrompt(false); setNewRowDraft({model:modelInput.trim(),sf:3.1}); };

  const deleteSubRow = async(id)=>{
    if(!confirm("Delete this BOM line?")) return;
    const{data:rowData}=await sb.from("bom").select("*").eq("id",id).single();
    await sb.from("bom").delete().eq("id",id);
    await logAudit("DELETE","bom",id,(rowData?.model||"")+" — "+(rowData?.component||""),"unknown",rowData,null);
    setSubRows(r=>r.filter(x=>x.id!==id));
  };

  const setDraft = (field,value)=>{
    setNewRowDraft(d=>{
      const next={...d,[field]:value};
      if(field==="material_spec") { delete next.grade; }
      return next;
    });
  };

  const specOptions = useMemo(()=>{
    if(!masterData) return [];
    const all = Array.from(new Set(masterData.specs.map(r=>r.material_spec).filter(Boolean))).sort();
    if(!newRowDraft.material_shape) return all;
    return Array.from(new Set(masterData.specs.filter(r=>r.material_shape===newRowDraft.material_shape).map(r=>r.material_spec).filter(Boolean))).sort();
  },[masterData, newRowDraft.material_shape]);

  const gradeOptions = useMemo(()=>{
    if(!masterData||!newRowDraft.material_spec) return [];
    return masterData.gradesBySpec.get(newRowDraft.material_spec)||[];
  },[masterData, newRowDraft.material_spec]);

  const lookedUpRate = useMemo(()=>{
    if(!masterData||!newRowDraft.material_spec||!newRowDraft.grade) return null;
    const hit = masterData.rateBySpecGrade.get(newRowDraft.material_spec+"||"+newRowDraft.grade);
    return hit ? hit.rate : null;
  },[masterData, newRowDraft.material_spec, newRowDraft.grade]);

  const saveNewRow = async()=>{
    setMsg("");
    if(!newRowDraft.model) { setMsg("Set a model first."); return; }
    setSavingNew(true);
    try {
      const rate = lookedUpRate!==null ? lookedUpRate : (Number(newRowDraft.rate)||0);
      const qty = Number(newRowDraft.qty_required)||0;
      const sf = Number(newRowDraft.sf)||3.1;
      const cost = qty*rate;
      const payload = {
        model:newRowDraft.model, item:newRowDraft.item||"", size:newRowDraft.size||"",
        sub_assembly:newRowDraft.sub_assembly||"", component:newRowDraft.component||"",
        material_shape:newRowDraft.material_shape||"",
        cutting_plan_layout_size:newRowDraft.cutting_plan_layout_size||"",
        cutting_plan_qty:Number(newRowDraft.cutting_plan_qty)||0,
        cutting_plan_uom:newRowDraft.cutting_plan_uom||"",
        material_spec:newRowDraft.material_spec||"",
        qty_required:qty, uom:newRowDraft.uom||"",
        spec_grade:(newRowDraft.material_spec||"")+(newRowDraft.grade||""),
        rate, cost, sf, sales_price:sf*cost,
      };
      const { data, error:err } = await sb.from("bom").insert(payload).select().single();
      if(err) throw err;
      setSubRows(r=>[...r,data]);
      setNewRowDraft({model:newRowDraft.model, sf:3.1});
      if(!allModels.includes(newRowDraft.model)) setAllModels(m=>[...m,newRowDraft.model].sort());
      setMsg("Row saved.");
    } catch(e) { setMsg("Save failed: "+e.message); } finally { setSavingNew(false); }
  };

  const iStyle = {...inputStyle, padding:"5px 7px", fontSize:12};
  const sel = (val,onChange,options,placeholder)=>h("select",{value:val||"",onChange:e=>onChange(e.target.value),style:iStyle},
    h("option",{value:""},placeholder||"—"),
    options.map(o=>h("option",{key:o,value:o},o))
  );

  if(loadingMasters) return h("div",{style:{padding:"40px 24px",color:colors.mutedLight}},"Loading master data…");

  return h("div",{style:{padding:"20px 24px"}},
    h("h2",{style:{margin:"0 0 16px",fontSize:18,fontWeight:700}},"BOM Entry Form"),

    // Main form — model selector
    h("div",{style:{padding:16,background:colors.panel,border:"1px solid "+colors.border,borderRadius:8,marginBottom:16,maxWidth:480}},
      h("label",{style:{display:"block",fontSize:12,color:colors.muted,marginBottom:6}},"Model number"),
      h("div",{style:{display:"flex",gap:8}},
        h("input",{
          ref:modelInputRef, list:"bom-model-list",
          value:modelInput, onChange:e=>handleModelSelect(e.target.value),
          onBlur:handleModelBlur,
          style:{...inputStyle,flex:1}, placeholder:"Type or pick a model…"
        }),
        modelInput&&allModels.includes(modelInput.trim())&&h("button",{
          onClick:()=>loadSubForm(modelInput.trim()),
          style:btnSecondary
        },"Reload")
      ),
      h("datalist",{id:"bom-model-list"},allModels.map(m=>h("option",{key:m,value:m}))),
      modelNotFoundPrompt&&h("div",{style:{marginTop:12,padding:12,background:"#fbf6e8",borderRadius:6,fontSize:13}},
        h("div",{style:{marginBottom:8,fontWeight:600}},"⚠ Model \""+modelInput.trim()+"\" doesn't exist in the database."),
        h("div",{style:{marginBottom:10,color:colors.muted}},"Go to the Models master to add it first, then come back here."),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{onClick:goAddModel,style:btnPrimary},"Yes — go to Models"),
          h("button",{onClick:stayPut,style:btnSecondary},"No — stay here (add rows for new model)")
        )
      ),
      msg&&h("div",{style:{marginTop:8,fontSize:12,color:msg.startsWith("Save failed")||msg.startsWith("Set")?colors.danger:colors.muted}},msg)
    ),

    // Sub-form
    (modelInput.trim()&&!modelNotFoundPrompt)&&h("div",{style:{border:"1px solid "+colors.border,borderRadius:8,background:colors.panel}},
      h("div",{style:{padding:"10px 14px",borderBottom:"1px solid "+colors.border,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span",{style:{fontSize:13,fontWeight:600}},"BOM lines for: "+modelInput.trim()+" ("+subRows.length+" rows)"),
      ),
      loadingSub?h("div",{style:{padding:20,color:colors.mutedLight,fontSize:13}},"Loading…"):
      h("div",{style:{overflowX:"auto"}},
        h("table",{style:{fontSize:12,minWidth:1100}},
          h("thead",null,
            h("tr",{style:{background:"#faf9f4",textAlign:"left",borderBottom:"2px solid "+colors.dark}},
              ["#","Component","Sub Assembly","Material Spec","Grade","Qty","UOM","Rate","Cost","Sf","Sales Price",""].map(c=>
                h("th",{key:c,style:{padding:"7px 8px",whiteSpace:"nowrap"}},c)
              )
            )
          ),
          h("tbody",null,
            subRows.map((r,idx)=>h("tr",{key:r.id,style:{borderBottom:"1px solid #eceae0",background:(!r.cost||r.cost===0)?"#fdecea":"transparent"}},
              h("td",{style:{padding:"6px 8px",color:colors.mutedLight}},idx+1),
              h("td",{style:{padding:"6px 8px",fontWeight:600}},r.component),
              h("td",{style:{padding:"6px 8px"}},[r.sub_assembly]),
              h("td",{style:{padding:"6px 8px"}},[r.material_spec]),
              h("td",{style:{padding:"6px 8px"}},[r.spec_grade]),
              h("td",{style:{padding:"6px 8px",textAlign:"right"}},[r.qty_required]),
              h("td",{style:{padding:"6px 8px"}},[r.uom]),
              h("td",{style:{padding:"6px 8px",textAlign:"right"}},[fmt(Number(r.rate)||0)]),
              h("td",{style:{padding:"6px 8px",textAlign:"right",fontWeight:700}},[fmt(Number(r.cost)||0)]),
              h("td",{style:{padding:"6px 8px",textAlign:"right"}},[r.sf||3.1]),
              h("td",{style:{padding:"6px 8px",textAlign:"right",color:colors.accent,fontWeight:700}},[fmt(Number(r.sales_price)||0)]),
              h("td",{style:{padding:"6px 8px"}},h("button",{onClick:()=>deleteSubRow(r.id),style:btnDanger},"Delete"))
            )),
            // New row input at the bottom
            h("tr",{style:{background:"#fbf6e8",borderTop:"2px solid "+colors.border}},
              h("td",{style:{padding:"6px 8px",color:colors.mutedLight,fontSize:11}},"new"),
              h("td",{style:{padding:"4px 6px"}},h("input",{list:"ci-list",value:newRowDraft.component||"",onChange:e=>setDraft("component",e.target.value),style:{...iStyle,width:110},placeholder:"Component"})),
              h("td",{style:{padding:"4px 6px"}},h("input",{list:"sa-list",value:newRowDraft.sub_assembly||"",onChange:e=>setDraft("sub_assembly",e.target.value),style:{...iStyle,width:110},placeholder:"Sub Assembly"})),
              h("td",{style:{padding:"4px 6px"}},
                h("input",{list:"spec-list-form",value:newRowDraft.material_spec||"",onChange:e=>setDraft("material_spec",e.target.value),style:{...iStyle,width:130},placeholder:"Material Spec"}),
                h("datalist",{id:"spec-list-form"},specOptions.map(s=>h("option",{key:s,value:s})))
              ),
              h("td",{style:{padding:"4px 6px"}},
                gradeOptions.length>0
                  ?sel(newRowDraft.grade,v=>setDraft("grade",v),gradeOptions.map(g=>g.grade),"Grade…")
                  :h("input",{value:newRowDraft.grade||"",onChange:e=>setDraft("grade",e.target.value),style:{...iStyle,width:110},placeholder:"Grade"})
              ),
              h("td",{style:{padding:"4px 6px"}},h("input",{type:"number",value:newRowDraft.qty_required||"",onChange:e=>setDraft("qty_required",e.target.value),style:{...iStyle,width:60,textAlign:"right"},placeholder:"Qty"})),

/* ---- MASTER DATA LOADER (for Estimator) ---- */
async function loadMasterData(setMasterData) {
  const [bomModels, rateRows, specRows] = await Promise.all([
    fetchAll("bom","model"),
    fetchAll("material_rates","material_spec,material_grade,rate,uom"),
    fetchAll("material_spec","material_spec,material_shape"),
  ]);
  const models = Array.from(new Set(bomModels.map(r=>r.model).filter(Boolean))).sort();
  const gradesBySpec=new Map(), rateBySpecGrade=new Map();
  rateRows.forEach(row=>{
    if(!row.material_spec||!row.material_grade) return;
    if(!gradesBySpec.has(row.material_spec)) gradesBySpec.set(row.material_spec,[]);
    gradesBySpec.get(row.material_spec).push({grade:row.material_grade,rate:row.rate||0,uom:row.uom||""});
    rateBySpecGrade.set(row.material_spec+"||"+row.material_grade,{rate:row.rate||0,uom:row.uom||""});
  });
  const allSpecs = Array.from(new Set(specRows.map(r=>r.material_spec).filter(Boolean))).sort();
  setMasterData({ models, gradesBySpec, rateBySpecGrade, allSpecs, loadingMaster:false });
}

/* ---- ESTIMATOR ---- */
function Estimator({ user, masterData, onRefresh, onOpenQuote }) {
  const { models, gradesBySpec, rateBySpecGrade, allSpecs, loadingMaster } = masterData;
  const [modelFilter,setModelFilter]=useState(""); const [selectedModel,setSelectedModel]=useState(null);
  const [lines,setLines]=useState([]); const [overrides,setOverrides]=useState({});
  const [loadingLines,setLoadingLines]=useState(false); const [error,setError]=useState("");
  const [cart,setCart]=useState([]); const [showSave,setShowSave]=useState(false);
  const [saveMaximised,setSaveMaximised]=useState(false);
  const [refNumber,setRefNumber]=useState(""); const [refDesc,setRefDesc]=useState("");
  const [itemSlNo,setItemSlNo]=useState(""); 
  const [enquiryNumber,setEnquiryNumber]=useState(""); const [enquiryDate,setEnquiryDate]=useState("");
  const [quoteDate,setQuoteDate]=useState("");
  const [existingQuoteHeader,setExistingQuoteHeader]=useState(null); // header fields + used Sl Nos, once refNumber matches a saved quote
  const [quoteOptions,setQuoteOptions]=useState([]); // distinct saved quotes for the Quote# combo box
  const [quoteDecision,setQuoteDecision]=useState(null); // {ref, rows:[{item_sl_no,model,...}]} — shown when an existing Quote# is picked
  const [slNoPickerValue,setSlNoPickerValue]=useState("");
  const [savingRef,setSavingRef]=useState(false); const [saveMsg,setSaveMsg]=useState("");

  // MOC popup
  const [showMOC,setShowMOC]=useState(false);
  const [mocLines,setMocLines]=useState([]);
  const [mocSelections,setMocSelections]=useState({});
  const [mocMode,setMocMode]=useState("shape"); // "shape" or "freetext"
  const [freeText,setFreeText]=useState("");
  const [parsedMatches,setParsedMatches]=useState(null); // null = not yet parsed
  const [unmatchedSelections,setUnmatchedSelections]=useState({});

  // Parse free text: split by comma/newline, fuzzy match against grade names per shape
  const parseFreeText = ()=>{
    const entries = freeText.split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
    const results = []; // {shape, inputText, matchedGrade, lines, matched}
    const usedShapes = new Set();
    shapeGroups.forEach(sg=>{
      // Find the entry that best matches this shape
      let bestEntry=null; let bestGrade=null; let bestScore=0;
      entries.forEach(entry=>{
        const el=entry.toLowerCase();
        // Check if any grade in this shape's options fuzzy-matches the entry
        sg.gradeOptions.forEach(grade=>{
          const gl=grade.toLowerCase();
          // Score: how many tokens from entry appear in the grade name
          const tokens=el.split(/\s+/);
          const matchCount=tokens.filter(t=>t.length>1&&gl.includes(t)).length;
          const score=matchCount/tokens.length;
          if(score>bestScore){ bestScore=score; bestEntry=entry; bestGrade=grade; }
        });
        // Also match by shape/component name keywords in entry
        const shapeKeywords=(sg.shape||"").toLowerCase().split(/[-\s]/);
        const entryTokens=el.split(/\s+/);
        const shapeMatch=shapeKeywords.some(kw=>kw.length>2&&entryTokens.some(t=>t.includes(kw)||kw.includes(t)));
        if(shapeMatch&&bestScore===0){
          // Shape name matched but no grade yet — try to match grade from this entry
          sg.gradeOptions.forEach(grade=>{
            const gl=grade.toLowerCase();
            const tokens=el.split(/\s+/);
            const matchCount=tokens.filter(t=>t.length>1&&gl.includes(t)).length;
            if(matchCount>0&&matchCount/tokens.length>bestScore){ bestScore=matchCount/tokens.length; bestEntry=entry; bestGrade=grade; }
          });
        }
      });
      results.push({ shape:sg.shape, inputText:bestEntry||null, matchedGrade:bestScore>0?bestGrade:null, lines:sg.lines.length, gradeOptions:sg.gradeOptions, matched:bestScore>0 });
      if(bestScore>0) usedShapes.add(sg.shape);
    });
    setParsedMatches(results);
    // Pre-fill unmatched selections from existing mocSelections
    const um={};
    results.filter(r=>!r.matched).forEach(r=>{ um[r.shape]=mocSelections[r.shape]||""; });
    setUnmatchedSelections(um);
  };

  const applyFreeText = ()=>{
    const newOverrides={};
    mocLines.forEach(l=>{
      const key=l.material_shape||l.material_spec||"";
      const match=parsedMatches&&parsedMatches.find(r=>r.shape===key);
      const selGrade=match?(match.matchedGrade||(unmatchedSelections[key]||"")):""
      if(!selGrade) return;
      const spec=l.material_spec||"";
      const hit=spec?rateBySpecGrade.get(spec+"||"+selGrade):null;
      newOverrides[l.id]={grade:selGrade,rate:hit?hit.rate:0};
    });
    setOverrides(newOverrides);
    setShowMOC(false);
    setMocMode("shape"); setFreeText(""); setParsedMatches(null);
  };

  const filteredModels = useMemo(()=>{ if(!modelFilter) return models.slice(0,80); const f=modelFilter.toLowerCase(); return models.filter(m=>m.toLowerCase().includes(f)).slice(0,80); },[modelFilter,models]);

  const selectModel = async(m)=>{
    setSelectedModel(m); setOverrides({}); setLoadingLines(true); setShowMOC(false); setMocSelections({}); setMocMode("shape"); setFreeText(""); setParsedMatches(null);
    const { data, error:err } = await sb.from("bom").select("*").eq("model",m);
    if(err) { setError(err.message); setLoadingLines(false); return; }
    const loadedLines = data||[];
    setLines(loadedLines);
    setLoadingLines(false);
    // Show MOC popup automatically
    setMocLines(loadedLines);
    setShowMOC(true);
  };

  // Compute distinct shapes in current model's lines
  const shapeGroups = useMemo(()=>{
    const map = new Map();
    mocLines.forEach(l=>{
      const shape = l.material_shape||"";
      const spec = l.material_spec||"";
      if(!shape && !spec) return;
      const key = shape || spec;
      if(!map.has(key)) map.set(key,{ shape:key, lines:[], gradeOptions:[] });
      map.get(key).lines.push(l);
    });
    // For each shape, find available grades from material_rates via gradesBySpec
    // grades are keyed by material_spec — find specs that have this shape
    map.forEach((val,key)=>{
      // collect all unique specs for this shape group
      const specs = Array.from(new Set(val.lines.map(l=>l.material_spec).filter(Boolean)));
      const grades = new Set();
      specs.forEach(spec=>{ (gradesBySpec.get(spec)||[]).forEach(g=>grades.add(g.grade)); });
      val.gradeOptions = Array.from(grades).sort();
      val.specs = specs;
    });
    return Array.from(map.values()).sort((a,b)=>b.lines.length-a.lines.length);

        ),

          h("button",{onClick:chooseAddLineItem,style:{border:"1px solid #1c8c75",borderRadius:6,padding:"9px 14px",background:"#eaf9f4",color:"#085041",fontSize:12.5,textAlign:"left",cursor:"pointer"}},"Create another line item (new Sl No)"),
